name: Set Gemini API secret

on:
  workflow_dispatch:

# Roda uma vez (ou toda vez que quiser trocar a chave) pra gravar a chave da
# API Gemini no Secret Manager do Firebase, sem precisar de terminal/Firebase
# CLI local. Passos:
#
#   1. Pegue uma chave gratuita em https://aistudio.google.com/apikey
#   2. GitHub → Settings → Secrets and variables → Actions →
#      New repository secret → nome "GEMINI_API_KEY_VALUE", valor: a chave
#   3. Aba Actions deste repo → "Set Gemini API secret" → Run workflow
#
# Depois disso a function `callGemini` (functions/src/index.ts) já lê a
# chave sozinha em todo deploy futuro — não precisa rodar de novo a menos
# que troque a chave.
#
# Required secrets:
#   FIREBASE_SERVICE_ACCOUNT_APP_PRODUTIVIDADE_KIE (já configurado, usado
#     também pelo deploy.yml)
#   GEMINI_API_KEY_VALUE (a chave em si — ver passo 2 acima)

jobs:
  set-secret:
    name: Set GEMINI_API_KEY in Secret Manager
    runs-on: ubuntu-latest

    steps:
      - name: Check required secret
        run: |
          if [ -z "${{ secrets.GEMINI_API_KEY_VALUE }}" ]; then
            echo "::error::Secret do repositório GEMINI_API_KEY_VALUE não configurado. Vá em Settings > Secrets and variables > Actions > New repository secret e adicione a chave gerada em https://aistudio.google.com/apikey."
            exit 1
          fi

      - name: Authenticate to Google Cloud
        run: echo '${{ secrets.FIREBASE_SERVICE_ACCOUNT_APP_PRODUTIVIDADE_KIE }}' | base64 -d > /tmp/sa.json

      - name: Set secret in Secret Manager
        run: echo -n "${{ secrets.GEMINI_API_KEY_VALUE }}" | npx firebase-tools@latest functions:secrets:set GEMINI_API_KEY --project app-produtividade-3ec9d --data-file=- --force
        env:
          GOOGLE_APPLICATION_CREDENTIALS: /tmp/sa.json
