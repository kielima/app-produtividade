name: Android APK

# Builda o APK (Capacitor) e o distribui em dois canais:
# - App Distribution: em cada Pull Request e no disparo manual (APK por PR para
#   testar no aparelho antes de mergear).
# - Atualização in-app: em cada push na main (e no disparo manual), hospeda o
#   APK no Firebase Hosting e grava o commit + URL no Firestore (`app/versao`).
#   É o canal que o verificador de atualização in-app (Configurações) consome.
# - Disparo manual: aba Actions → "Android APK" → Run workflow.
on:
  workflow_dispatch:
    inputs:
      notes:
        description: 'Notas da versão (aparecem no App Distribution)'
        required: false
        default: 'Build automático'
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build:
    name: Build & distribute
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      # Carimba no app o commit realmente construído (tip do checkout). É o
      # MESMO valor gravado no Firestore (`app/versao.commit`) pelo passo de
      # publicação, então o verificador de atualização compara igual com igual.
      - name: Carimbar commit do build
        run: echo "APP_COMMIT=$(git rev-parse HEAD)" >> "$GITHUB_ENV"

      - name: Setup Node 22
        uses: actions/setup-node@v4
        with:
          # O Capacitor 8 CLI (cap sync) exige Node >= 22.
          node-version: 22
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Build web (dist/)
        run: npm run build
        env:
          # Injeta o commit no bundle (__APP_COMMIT__) para o verificador
          # comparar com a última build publicada.
          APP_COMMIT: ${{ env.APP_COMMIT }}
          VITE_FIREBASE_API_KEY: ${{ secrets.VITE_FIREBASE_API_KEY }}
          VITE_FIREBASE_AUTH_DOMAIN: ${{ secrets.VITE_FIREBASE_AUTH_DOMAIN }}
          VITE_FIREBASE_PROJECT_ID: ${{ secrets.VITE_FIREBASE_PROJECT_ID }}
          VITE_FIREBASE_STORAGE_BUCKET: ${{ secrets.VITE_FIREBASE_STORAGE_BUCKET }}
          VITE_FIREBASE_MESSAGING_SENDER_ID: ${{ secrets.VITE_FIREBASE_MESSAGING_SENDER_ID }}
          VITE_FIREBASE_APP_ID: ${{ secrets.VITE_FIREBASE_APP_ID }}
          VITE_GOOGLE_OAUTH_CLIENT_ID: ${{ secrets.VITE_GOOGLE_OAUTH_CLIENT_ID }}

      - name: Setup Java 21
        uses: actions/setup-java@v4
        with:
          # O Capacitor 8 compila o Android com Java 21 (sourceCompatibility 21).
          distribution: temurin
          java-version: 21

      # google-services.json é a config do app Android no Firebase (necessária
      # para o Google Sign-In nativo). Não é segredo forte, mas evitamos
      # versioná-la: vem do secret GOOGLE_SERVICES_JSON e é sanitizada (mesmo
      # cuidado com BOM/lixo de cola do secret do Firebase).
      - name: Escrever google-services.json
        env:
          GOOGLE_SERVICES_JSON: ${{ secrets.GOOGLE_SERVICES_JSON }}
        run: |
          if [ -z "${GOOGLE_SERVICES_JSON:-}" ]; then
            echo "AVISO: secret GOOGLE_SERVICES_JSON ausente — o APK vai buildar, "
            echo "mas o login nativo com Google não vai funcionar até adicioná-lo."
            exit 0
          fi
          python3 - android/app/google-services.json <<'PY'
          import base64, json, os, sys
          raw = os.environ["GOOGLE_SERVICES_JSON"]
          out_path = sys.argv[1]
          s = raw.lstrip("\ufeff").strip().strip("'\"").strip()
          if not s.startswith("{"):
              try:
                  decoded = base64.b64decode(s, validate=False).decode("utf-8")
                  if decoded.lstrip("\ufeff").strip().startswith("{"):
                      s = decoded.lstrip("\ufeff").strip()
              except Exception:
                  pass
          i, j = s.find("{"), s.rfind("}")
          if i != -1 and j != -1 and j > i:
              s = s[i:j + 1]
          try:
              d = json.loads(s)
          except Exception as e:
              sys.exit(f"ERRO: GOOGLE_SERVICES_JSON não é um JSON válido ({e}).")
          with open(out_path, "w", encoding="utf-8") as f:
              json.dump(d, f)
          print("google-services.json escrito. project_id =",
                d.get("project_info", {}).get("project_id"))
          PY

      - name: Capacitor sync (copia web + plugins para o android/)
        run: npx cap sync android

      - name: Build debug APK
        working-directory: android
        run: ./gradlew assembleDebug --no-daemon
        env:
          ANDROID_VERSION_CODE: ${{ github.run_number }}

      # Upload via firebase-tools oficial (mais transparente que a action de
      # terceiros). Autentica pela conta de serviço em GOOGLE_APPLICATION_CREDENTIALS.
      - name: Upload para Firebase App Distribution
        env:
          FIREBASE_SERVICE_ACCOUNT: ${{ secrets.FIREBASE_SERVICE_ACCOUNT }}
          FIREBASE_ANDROID_APP_ID: ${{ secrets.FIREBASE_ANDROID_APP_ID }}
          RELEASE_NOTES: "${{ github.event.inputs.notes || (github.event.pull_request && format('PR {0} {1}', github.event.pull_request.number, github.event.pull_request.title)) || github.sha }}"
        run: |
          # Sanitiza o secret antes de usar: cópia/cola no celular costuma
          # introduzir um BOM (U+FEFF), espaços não-quebráveis ou lixo antes do
          # primeiro `{`, o que faz o JSON falhar na coluna 1. Também aceitamos o
          # secret em base64 (forma à prova de cola). Este passo:
          #   1. tira BOM e espaços das pontas;
          #   2. se não começar com `{`, tenta decodificar base64;
          #   3. recorta do primeiro `{` ao último `}` (remove lixo residual);
          #   4. valida o JSON e mostra só campos NÃO sensíveis.
          python3 - "$RUNNER_TEMP/firebase-sa.json" <<'PY'
          import base64, json, os, sys
          raw = os.environ["FIREBASE_SERVICE_ACCOUNT"]
          out_path = sys.argv[1]
          print("Bytes do secret (bruto):", len(raw.encode("utf-8")))
          # 1. remove BOM e espaços/aspas das pontas
          s = raw.lstrip("\ufeff").strip().strip("'\"").strip()
          # 2. se não parece JSON, tenta base64
          if not s.startswith("{"):
              try:
                  decoded = base64.b64decode(s, validate=False).decode("utf-8")
                  if decoded.lstrip("\ufeff").strip().startswith("{"):
                      s = decoded.lstrip("\ufeff").strip()
                      print("Secret estava em base64: decodificado com sucesso.")
              except Exception:
                  pass
          # 3. recorta do primeiro { ao último } (remove lixo residual de cola)
          i, j = s.find("{"), s.rfind("}")
          if i != -1 and j != -1 and j > i:
              s = s[i:j + 1]
          # 4. valida
          try:
              d = json.loads(s)
          except Exception as e:
              sys.exit(
                  "ERRO: o secret FIREBASE_SERVICE_ACCOUNT não é um JSON válido "
                  f"nem base64 de um JSON ({e}). Regere a chave da conta de "
                  "serviço no Firebase e cole o JSON INTEIRO (do { ao }) no secret."
              )
          with open(out_path, "w", encoding="utf-8") as f:
              json.dump(d, f)
          print("type       =", d.get("type"))
          print("project_id =", d.get("project_id"))
          print("client_email presente =", bool(d.get("client_email")))
          print("private_key presente  =", bool(d.get("private_key")))
          PY
          export GOOGLE_APPLICATION_CREDENTIALS="$RUNNER_TEMP/firebase-sa.json"
          npx --yes firebase-tools@latest appdistribution:distribute \
            android/app/build/outputs/apk/debug/app-debug.apk \
            --app "$FIREBASE_ANDROID_APP_ID" \
            --groups testers \
            --release-notes "$RELEASE_NOTES" \
            --debug

      - name: Guardar APK como artefato do build
        uses: actions/upload-artifact@v4
        with:
          name: app-debug-apk
          path: android/app/build/outputs/apk/debug/app-debug.apk

      # Canal de atualização in-app: hospeda o APK no Firebase Hosting (site
      # DEDICADO, separado do site do PWA para não sobrescrevê-lo) e grava o doc
      # `app/versao` no Firestore com o commit + URL. O verificador dentro do app
      # lê esse doc, compara com o commit instalado (__APP_COMMIT__) e baixa o
      # APK se houver versão nova. Só fora de PR (o commit do PR não é a versão
      # publicada). Reaproveita a service account escrita pelo passo anterior.
      #
      # PRÉ-REQUISITO (uma vez): criar o site de distribuição no Firebase Console
      # (Hosting → Adicionar outro site) com o id abaixo. O plano gratuito
      # (Spark) permite hospedar o APK; o Storage exigiria o plano Blaze. Se usar
      # outro id, defina a Variable PRODUTIVIDADE_HOSTING_SITE no repositório.
      - name: Publicar atualização no Firebase (Hosting + Firestore)
        if: ${{ always() && github.event_name != 'pull_request' }}
        env:
          # Site de Hosting DEDICADO à distribuição do APK. Sem a Variable, usa
          # 'app-produtividade-builds'. O APK fica em
          # https://<site>.web.app/builds/produtividade.zip
          HOSTING_SITE: ${{ vars.PRODUTIVIDADE_HOSTING_SITE || 'app-produtividade-builds' }}
        run: |
          set -euo pipefail
          if [ ! -f "$RUNNER_TEMP/firebase-sa.json" ]; then
            echo "Service account ausente — o passo de App Distribution não a escreveu."
            exit 1
          fi
          export GOOGLE_APPLICATION_CREDENTIALS="$RUNNER_TEMP/firebase-sa.json"
          PROJECT_ID=$(node -p "require(process.env.GOOGLE_APPLICATION_CREDENTIALS).project_id")
          # Aponta o deploy para o SITE dedicado (não o site padrão do PWA).
          node -e "const fs=require('fs');const p='firebase.hosting-builds.json';const j=JSON.parse(fs.readFileSync(p));j.hosting.site=process.env.HOSTING_SITE;fs.writeFileSync(p,JSON.stringify(j,null,2));"
          # Servimos com extensão .zip (um APK É um zip) porque o plano gratuito
          # do Hosting recusa ficheiros .apk. O plugin nativo grava como
          # produtividade.apk e força o tipo APK no instalador, então a extensão
          # do URL não afeta a instalação.
          mkdir -p firebase-hosting/builds
          cp android/app/build/outputs/apk/debug/app-debug.apk firebase-hosting/builds/produtividade.zip
          # Tolera o caso benigno em que o APK é byte-idêntico ao já publicado
          # (re-deploy do mesmo commit): o Hosting recusa "re-lançar" a versão
          # idêntica com HTTP 400 "is the current active version". Nesse caso o
          # APK correto JÁ está no ar, então seguimos e atualizamos o Firestore.
          set +e
          DEPLOY_OUT=$(npx --yes firebase-tools@latest deploy --only hosting \
            --config firebase.hosting-builds.json --project "$PROJECT_ID" \
            --non-interactive 2>&1)
          DEPLOY_RC=$?
          set -e
          printf '%s\n' "$DEPLOY_OUT"
          if [ "$DEPLOY_RC" -ne 0 ]; then
            if printf '%s' "$DEPLOY_OUT" | grep -q "is the current active version"; then
              echo "Deploy no-op (APK já é a versão ativa) — seguindo para o Firestore."
            else
              echo "Deploy do Hosting falhou (rc=$DEPLOY_RC)."
              exit "$DEPLOY_RC"
            fi
          fi
          # Registra a versão (commit + URL) no Firestore. firebase-admin já vem
          # das devDependencies instaladas por `npm ci`.
          APK_URL="https://$HOSTING_SITE.web.app/builds/produtividade.zip" \
            node scripts/publicar-firebase.mjs
