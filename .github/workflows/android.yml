name: Android APK

# Builda o APK (Capacitor) e envia para o Firebase App Distribution.
# - Disparo manual: aba Actions → "Android APK" → Run workflow.
# - Automático: a cada Pull Request para a main (gera um APK por PR para testar
#   no aparelho antes de mergear).
on:
  workflow_dispatch:
    inputs:
      notes:
        description: 'Notas da versão (aparecem no App Distribution)'
        required: false
        default: 'Build automático'
  pull_request:
    branches: [main]

jobs:
  build:
    name: Build & distribute
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node 22
        uses: actions/setup-node@v4
        with:
          # O Capacitor 8 CLI (cap sync) exige Node >= 22.
          node-version: 22
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Build web (dist/)
        run: npm run build
        env:
          VITE_FIREBASE_API_KEY: ${{ secrets.VITE_FIREBASE_API_KEY }}
          VITE_FIREBASE_AUTH_DOMAIN: ${{ secrets.VITE_FIREBASE_AUTH_DOMAIN }}
          VITE_FIREBASE_PROJECT_ID: ${{ secrets.VITE_FIREBASE_PROJECT_ID }}
          VITE_FIREBASE_STORAGE_BUCKET: ${{ secrets.VITE_FIREBASE_STORAGE_BUCKET }}
          VITE_FIREBASE_MESSAGING_SENDER_ID: ${{ secrets.VITE_FIREBASE_MESSAGING_SENDER_ID }}
          VITE_FIREBASE_APP_ID: ${{ secrets.VITE_FIREBASE_APP_ID }}
          VITE_GOOGLE_OAUTH_CLIENT_ID: ${{ secrets.VITE_GOOGLE_OAUTH_CLIENT_ID }}

      - name: Setup Java 21
        uses: actions/setup-java@v4
        with:
          # O Capacitor 8 compila o Android com Java 21 (sourceCompatibility 21).
          distribution: temurin
          java-version: 21

      - name: Capacitor sync (copia web + plugins para o android/)
        run: npx cap sync android

      - name: Build debug APK
        working-directory: android
        run: ./gradlew assembleDebug --no-daemon
        env:
          ANDROID_VERSION_CODE: ${{ github.run_number }}

      # Upload via firebase-tools oficial (mais transparente que a action de
      # terceiros). Autentica pela conta de serviço em GOOGLE_APPLICATION_CREDENTIALS.
      - name: Upload para Firebase App Distribution
        env:
          FIREBASE_SERVICE_ACCOUNT: ${{ secrets.FIREBASE_SERVICE_ACCOUNT }}
          FIREBASE_ANDROID_APP_ID: ${{ secrets.FIREBASE_ANDROID_APP_ID }}
          RELEASE_NOTES: "${{ github.event.inputs.notes || (github.event.pull_request && format('PR {0} {1}', github.event.pull_request.number, github.event.pull_request.title)) || github.sha }}"
        run: |
          # Sanitiza o secret antes de usar: cópia/cola no celular costuma
          # introduzir um BOM (U+FEFF), espaços não-quebráveis ou lixo antes do
          # primeiro `{`, o que faz o JSON falhar na coluna 1. Também aceitamos o
          # secret em base64 (forma à prova de cola). Este passo:
          #   1. tira BOM e espaços das pontas;
          #   2. se não começar com `{`, tenta decodificar base64;
          #   3. recorta do primeiro `{` ao último `}` (remove lixo residual);
          #   4. valida o JSON e mostra só campos NÃO sensíveis.
          python3 - "$RUNNER_TEMP/firebase-sa.json" <<'PY'
          import base64, json, os, sys
          raw = os.environ["FIREBASE_SERVICE_ACCOUNT"]
          out_path = sys.argv[1]
          print("Bytes do secret (bruto):", len(raw.encode("utf-8")))
          # 1. remove BOM e espaços/aspas das pontas
          s = raw.lstrip("\ufeff").strip().strip("'\"").strip()
          # 2. se não parece JSON, tenta base64
          if not s.startswith("{"):
              try:
                  decoded = base64.b64decode(s, validate=False).decode("utf-8")
                  if decoded.lstrip("\ufeff").strip().startswith("{"):
                      s = decoded.lstrip("\ufeff").strip()
                      print("Secret estava em base64: decodificado com sucesso.")
              except Exception:
                  pass
          # 3. recorta do primeiro { ao último } (remove lixo residual de cola)
          i, j = s.find("{"), s.rfind("}")
          if i != -1 and j != -1 and j > i:
              s = s[i:j + 1]
          # 4. valida
          try:
              d = json.loads(s)
          except Exception as e:
              sys.exit(
                  "ERRO: o secret FIREBASE_SERVICE_ACCOUNT não é um JSON válido "
                  f"nem base64 de um JSON ({e}). Regere a chave da conta de "
                  "serviço no Firebase e cole o JSON INTEIRO (do { ao }) no secret."
              )
          with open(out_path, "w", encoding="utf-8") as f:
              json.dump(d, f)
          print("type       =", d.get("type"))
          print("project_id =", d.get("project_id"))
          print("client_email presente =", bool(d.get("client_email")))
          print("private_key presente  =", bool(d.get("private_key")))
          PY
          export GOOGLE_APPLICATION_CREDENTIALS="$RUNNER_TEMP/firebase-sa.json"
          npx --yes firebase-tools@latest appdistribution:distribute \
            android/app/build/outputs/apk/debug/app-debug.apk \
            --app "$FIREBASE_ANDROID_APP_ID" \
            --groups testers \
            --release-notes "$RELEASE_NOTES" \
            --debug

      - name: Guardar APK como artefato do build
        uses: actions/upload-artifact@v4
        with:
          name: app-debug-apk
          path: android/app/build/outputs/apk/debug/app-debug.apk
