# Auto-merge: squash-merge PRs automatically when CI passes
name: Auto-merge

on:
  workflow_run:
    workflows: ["CI"]
    types: [completed]

jobs:
  auto-merge:
    name: Squash-merge when CI passes
    runs-on: ubuntu-latest
    if: github.event.workflow_run.conclusion == 'success'
    permissions:
      contents: write
      pull-requests: write
      actions: write

    steps:
      - name: Find open non-draft PR for this commit
        id: find-pr
        uses: actions/github-script@v7
        with:
          script: |
            const headSha = context.payload.workflow_run.head_sha;
            const headBranch = context.payload.workflow_run.head_branch;

            const { data: prs } = await github.rest.pulls.list({
              owner: context.repo.owner,
              repo: context.repo.repo,
              state: 'open',
              head: `${context.repo.owner}:${headBranch}`,
            });

            const pr = prs.find(p => p.head.sha === headSha && !p.draft);

            if (!pr) {
              core.info('No open non-draft PR found for this commit — skipping.');
              core.setOutput('found', 'false');
              return;
            }

            core.info(`Found PR #${pr.number}: ${pr.title}`);
            core.setOutput('found', 'true');
            core.setOutput('number', String(pr.number));

      - name: Squash-merge the PR
        if: steps.find-pr.outputs.found == 'true'
        uses: actions/github-script@v7
        with:
          script: |
            const prNumber = parseInt('${{ steps.find-pr.outputs.number }}', 10);

            await github.rest.pulls.merge({
              owner: context.repo.owner,
              repo: context.repo.repo,
              pull_number: prNumber,
              merge_method: 'squash',
            });

            core.info(`PR #${prNumber} merged via squash.`);

      # Pushes feitos com GITHUB_TOKEN não disparam workflows (proteção
      # anti-loop do GitHub), então o deploy.yml escutando `push: main`
      # nunca rodaria para PRs auto-mesclados. workflow_dispatch é a
      # exceção documentada, então chamamos o deploy explicitamente aqui.
      - name: Trigger deploy
        if: steps.find-pr.outputs.found == 'true'
        uses: actions/github-script@v7
        with:
          script: |
            await github.rest.actions.createWorkflowDispatch({
              owner: context.repo.owner,
              repo: context.repo.repo,
              workflow_id: 'deploy.yml',
              ref: 'main',
            });

            core.info('Deploy disparado em main.');

      # Mesma regra anti-loop do GitHub: o android.yml (que escuta `push: main`
      # para publicar o APK no Hosting + gravar a versão no Firestore, o canal
      # de atualização in-app) NÃO roda em PRs auto-mesclados. Disparamos aqui
      # explicitamente, senão o APK novo nunca chega ao verificador do app.
      - name: Trigger Android APK (publicar atualização in-app)
        if: steps.find-pr.outputs.found == 'true'
        uses: actions/github-script@v7
        with:
          script: |
            await github.rest.actions.createWorkflowDispatch({
              owner: context.repo.owner,
              repo: context.repo.repo,
              workflow_id: 'android.yml',
              ref: 'main',
            });

            core.info('Android APK disparado em main.');
