name: Migrate MD data to Firestore

# Dispara automaticamente quando o arquivo trigger migration-data/.run-migration
# muda no main. Também aceita disparo manual via Actions UI (workflow_dispatch).
on:
  push:
    branches: [main]
    paths:
      - 'migration-data/.run-migration'
  workflow_dispatch:
    inputs:
      uid:
        description: 'UID do usuário (Firebase Auth)'
        required: true
        type: string
        default: 'X186iUM2Mph3Or5rYMOB5FHhINq2'
      dry_run:
        description: 'Dry run (não escreve no Firestore)'
        required: false
        type: boolean
        default: false

env:
  DEFAULT_UID: X186iUM2Mph3Or5rYMOB5FHhINq2

jobs:
  migrate:
    name: Migrate
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node 20
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Decode Firebase service account
        run: echo '${{ secrets.FIREBASE_SERVICE_ACCOUNT_APP_PRODUTIVIDADE_KIE }}' | base64 -d > /tmp/sa.json

      - name: Resolve UID & dry-run flag
        id: vars
        run: |
          TARGET_UID="${{ inputs.uid }}"
          if [ -z "$TARGET_UID" ]; then TARGET_UID="${DEFAULT_UID}"; fi
          echo "uid=$TARGET_UID" >> $GITHUB_OUTPUT

          if [ "${{ inputs.dry_run }}" = "true" ]; then
            echo "dry_flag=--dry-run" >> $GITHUB_OUTPUT
          else
            echo "dry_flag=" >> $GITHUB_OUTPUT
          fi

      - name: Run migration
        run: |
          npm run migrate -- \
            --uid="${{ steps.vars.outputs.uid }}" \
            ${{ steps.vars.outputs.dry_flag }} \
            --tasks=migration-data/Minhas_Tarefas.md \
            --projects=migration-data/Meus_Projetos.md \
            --memory=migration-data/memory
        env:
          GOOGLE_APPLICATION_CREDENTIALS: /tmp/sa.json
