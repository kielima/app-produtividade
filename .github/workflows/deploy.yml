name: Deploy to Firebase Hosting

on:
  push:
    branches: [main]

# Required secret: FIREBASE_SERVICE_ACCOUNT_APP_PRODUTIVIDADE_KIE
# Firebase Console → Project settings → Service accounts → Generate new private key
# GitHub → Settings → Secrets and variables → Actions → New repository secret

jobs:
  deploy:
    name: Build & Deploy
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node 20
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build
        env:
          VITE_FIREBASE_API_KEY: AIzaSyBQ8FmHCzAN5IVL0ybdU0Y_MkmQiAVJ5cA
          VITE_FIREBASE_AUTH_DOMAIN: app-produtividade-3ec9d.firebaseapp.com
          VITE_FIREBASE_PROJECT_ID: app-produtividade-3ec9d
          VITE_FIREBASE_STORAGE_BUCKET: app-produtividade-3ec9d.firebasestorage.app
          VITE_FIREBASE_MESSAGING_SENDER_ID: "739803156090"
          VITE_FIREBASE_APP_ID: 1:739803156090:web:c132479563bf01163135c3

      - name: Authenticate to Google Cloud
        uses: google-github-actions/auth@v2
        with:
          credentials_json: ${{ secrets.FIREBASE_SERVICE_ACCOUNT_APP_PRODUTIVIDADE_KIE }}

      - name: Deploy to Firebase Hosting
        run: npx firebase-tools@latest deploy --only hosting --project app-produtividade-3ec9d --non-interactive
