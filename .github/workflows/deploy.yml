name: Deploy to Firebase Hosting

on:
  push:
    branches: [main]
  workflow_dispatch:

# Required secret: FIREBASE_SERVICE_ACCOUNT_APP_PRODUTIVIDADE_KIE
# Firebase Console → Project settings → Service accounts → Generate new private key
# GitHub → Settings → Secrets and variables → Actions → New repository secret
# O JSON precisa ser válido (começa com { termina com })

jobs:
  deploy:
    name: Build & Deploy
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node 20
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build
        env:
          VITE_FIREBASE_API_KEY: AIzaSyBQ8FmHCzAN5IVL0ybdU0Y_MkmQiAVJ5cA
          VITE_FIREBASE_AUTH_DOMAIN: app-produtividade-3ec9d.firebaseapp.com
          VITE_FIREBASE_PROJECT_ID: app-produtividade-3ec9d
          VITE_FIREBASE_STORAGE_BUCKET: app-produtividade-3ec9d.firebasestorage.app
          VITE_FIREBASE_MESSAGING_SENDER_ID: "739803156090"
          VITE_FIREBASE_APP_ID: 1:739803156090:web:c132479563bf01163135c3
          VITE_GOOGLE_OAUTH_CLIENT_ID: 739803156090-n0f203p9io7276nm1uujsauntue6l644.apps.googleusercontent.com

      - name: Authenticate to Google Cloud
        run: echo '${{ secrets.FIREBASE_SERVICE_ACCOUNT_APP_PRODUTIVIDADE_KIE }}' | base64 -d > /tmp/sa.json

      - name: Deploy to Firebase (hosting + firestore + functions)
        # As Functions detêm o refresh token do Google Calendar. Só o secret
        # GOOGLE_OAUTH_CLIENT_SECRET vive no Secret Manager (o client ID é
        # público, constante no código); o predeploy em firebase.json
        # instala/builda functions/ antes do deploy.
        # --force: aceita automaticamente a cleanup policy do Artifact Registry,
        # senão o deploy falha pedindo confirmação interativa (mesmo já tendo
        # publicado as functions com sucesso).
        run: npx firebase-tools@latest deploy --only hosting,firestore,functions --project app-produtividade-3ec9d --non-interactive --force
        env:
          GOOGLE_APPLICATION_CREDENTIALS: /tmp/sa.json
