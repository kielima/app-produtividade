<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <!-- Fundo off-white preenchendo borda a borda (sem cantos arredondados)
       pra que o maskable não deixe área transparente e launchers (Samsung,
       Pixel) não adicionem moldura branca extra. Cantos são aplicados pelo
       SO/launcher conforme a máscara do tema. -->
  <rect width="512" height="512" fill="#f3ede3"/>
  <!-- Checkmark minimalista em tom escuro quente (não preto puro).
       Posicionado dentro da safe zone maskable (~80% central, x:51..461).
       Stroke largo (56px ≈ 11%) com cantos arredondados pra leitura limpa
       em tamanhos pequenos (64x64 e abaixo). -->
  <path
    d="M 132 268 L 224 360 L 388 168"
    fill="none"
    stroke="#2b2b2b"
    stroke-width="56"
    stroke-linecap="round"
    stroke-linejoin="round"
  />
</svg>
