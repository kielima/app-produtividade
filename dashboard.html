    // ============================================================
    // ===== TASKS FUNCTIONALITY =====
    // ============================================================

    let taskFileHandle = null;
    let taskFileName = '';
    let sections = [];
    let tasks = {};
    let hasChanges = false;
    let currentView = 'board';
    let quickAddSection = null;

    // ===== Filter state =====
    let activeProjectFilter   = '';       // '' = todos; ou section.id para filtrar por projeto
    let prioridadeModoFilter  = 'todas';  // 'todas' | 'manuais' | 'ia'

    // ===== Calendar state =====
    let calendarCurrentDate = new Date();
    let calendarSelectedDate = null;

    // ===== Dependency system =====
    let depMap = {};            // internalId → { blockedByIds: [], unlocksIds: [] }
    let taskFlatMap = {};       // internalId → task
    let taskIdMap = {};         // taskId (número persistente) → task
    let potentialScoreMap = {}; // internalId → score potencial (sem penalty de bloqueio, sem depBonus)

    function getDisplayTitle(title) {
      const idx = title.indexOf('🔗');
      const base = idx === -1 ? title : title.slice(0, idx);
      return base
        .replace(/\s*\[#\d+\]/g, '')
        .replace(/\s*\[(Must|Should|Could|Won't|Wont|Manual|Colaborar|Delegar|Automatizar|Rápido|Rapido|Médio|Medio|Longo)\]/gi, '')
        .replace(/\s*\[prazo:[^\]]+\]/gi, '')
        .replace(/\s*\(adicionado:\s*\d{4}-\d{2}-\d{2}\)/gi, '')
        .trim();
    }

    // Split title into lowercase tokens for word-boundary dep matching
    function depTitleTokens(title) {
      return getDisplayTitle(title).toLowerCase().split(/[\s()\[\],;:\/\-+*&]+/).filter(Boolean);
    }
    function depWordMatch(title, needle) {
      return depTitleTokens(title).some(w => w === needle);
    }

    function buildDependencyMap() {
      depMap = {};
      taskFlatMap = {};
      taskIdMap = {};
      potentialScoreMap = {};
      const allTasks = [];
      sections.forEach(s => (tasks[s.id] || []).forEach(t => allTasks.push({ task: t, section: s })));
      allTasks.forEach(({ task: t }) => {
        depMap[t.id] = { blockedByIds: [], unlocksIds: [] };
        taskFlatMap[t.id] = t;
        if (t.taskId != null) taskIdMap[t.taskId] = t;
      });
      allTasks.forEach(({ task: t }) => {
        if (!t.dependsOn || t.dependsOn.length === 0) return;
        t.dependsOn.forEach(depText => {
          let depTask;
          const idMatch = depText.trim().match(/^#(\d+)$/);
          if (idMatch) {
            depTask = taskIdMap[parseInt(idMatch[1], 10)];
          } else {
            const needle = depText.toLowerCase().trim();
            depTask = allTasks.map(x => x.task).find(o => o.id !== t.id && depWordMatch(o.title, needle))
              || allTasks.map(x => x.task).find(o => o.id !== t.id && getDisplayTitle(o.title).toLowerCase().includes(needle));
          }
          if (depTask) {
            if (!depMap[t.id].blockedByIds.includes(depTask.id))
              depMap[t.id].blockedByIds.push(depTask.id);
            if (!depMap[depTask.id]) depMap[depTask.id] = { blockedByIds: [], unlocksIds: [] };
            if (!depMap[depTask.id].unlocksIds.includes(t.id))
              depMap[depTask.id].unlocksIds.push(t.id);
          }
        });
      });

      // Passo 1: calcular score potencial de cada tarefa (sem penalty de bloqueio, sem depBonus)
      // Usado no Passo 2 para o bônus de desbloqueio de calcScore()
      const mPts = { must: 3, should: 2, could: 1, wont: 0, '': 1 };
      const effortDiv = { rapido: 1, medio: 2, longo: 3, '': 1 };
      const today = new Date(); today.setHours(0,0,0,0);
      allTasks.forEach(({ task: t, section: s }) => {
        const taskM = t.moscow || '';
        const catM  = s ? (s.moscow || '') : '';
        if (taskM === 'wont') { potentialScoreMap[t.id] = 0; return; }
        const base = (mPts[catM] ?? 1) * (mPts[taskM] ?? 1);
        const inProgressBonus = t.inProgress ? 1 : 0;
        let deadlineBonus = 0;
        if (t.deadline) {
          const due = new Date(t.deadline); due.setHours(0,0,0,0);
          const diff = Math.round((due - today) / 86400000);
          if (diff < 0)       deadlineBonus = 5 + Math.abs(diff);
          else if (diff === 0) deadlineBonus = 4;
          else if (diff === 1) deadlineBonus = 3;
          else if (diff <= 7)  deadlineBonus = 2;
          else                 deadlineBonus = 1;
        }
        let ageBonus = 0;
        if (t.addedDate) {
          const added = new Date(t.addedDate); added.setHours(0,0,0,0);
          const dias = Math.max(0, Math.round((today - added) / 86400000));
          ageBonus = Math.log2(dias + 1);
        }
        const effort = effortDiv[t.esforco || ''] ?? 1;
        potentialScoreMap[t.id] = (base + inProgressBonus + deadlineBonus + ageBonus) / effort;
      });
    }

    // ===== FILTRO DE PROJETO =====
    function getActiveSections() {
      if (!activeProjectFilter) return sections;
      return sections.filter(s => s.id === activeProjectFilter);

    // Verifica se uma tarefa tem bloqueadores ativos (usada no sort)
    function isTaskBlocked(task) {
      const dep = depMap[task.id] || { blockedByIds: [] };
      return dep.blockedByIds.some(id => taskFlatMap[id] && !taskFlatMap[id].checked);
    }

    // Sort global: não-bloqueadas primeiro (por score desc), bloqueadas por último (por score desc)
    // Requer que os itens do array tenham _section setado
    function sortByScoreBlockedLast(arr) {
      return arr.slice().sort((a, b) => {
        const aBlk = isTaskBlocked(a) ? 1 : 0;
        const bBlk = isTaskBlocked(b) ? 1 : 0;
        if (aBlk !== bBlk) return aBlk - bBlk;
        return calcScore(b, b._section) - calcScore(a, a._section);
      });
    }

    function showDepModal(taskId, mode) {

        const t = taskFlatMap[id];

          </div>
          <button onclick="removeDependency('${removeFromId}','${removeToId}');closDepModal()"
            title="Remover dependência"
            style="flex-shrink:0;background:none;border:1px solid transparent;cursor:pointer;color:var(--text-muted);font-size:13px;padding:2px 6px;border-radius:4px;margin-left:8px;line-height:1;"
            onmouseover="this.style.color='#e74c3c';this.style.borderColor='rgba(231,76,60,0.4)';this.style.background='rgba(231,76,60,0.08)'"
            onmouseout="this.style.color='var(--text-muted)';this.style.borderColor='transparent';this.style.background='none'">✕</button>
        </div>`;

    function scrollToTask(taskId) {

      if (currentView !== 'board') switchTaskView('board');

    // ===== Atribuição e migração de IDs persistentes =====
    function assignAndMigrateIds() {
      // Passo 1: encontrar o maior ID já existente
      let maxId = 0;
      sections.forEach(s => {
        (tasks[s.id] || []).forEach(t => {
          if (t.taskId != null && t.taskId > maxId) maxId = t.taskId;
        });
      });

      // Passo 2: atribuir [#NNN] a tarefas sem ID
      let nextId = maxId + 1;
      let anyChange = false;
      sections.forEach(s => {
        (tasks[s.id] || []).forEach(t => {
          if (t.taskId != null) return;
          t.taskId = nextId++;
          const idTag = `[#${String(t.taskId).padStart(4, '0')}]`;
          const dIdx = t.title.indexOf('🔗');
          t.title = dIdx !== -1
            ? t.title.slice(0, dIdx).trimEnd() + ' ' + idTag + ' ' + t.title.slice(dIdx)
            : t.title.trimEnd() + ' ' + idTag;
          anyChange = true;
        });
      });

      // Passo 3: migrar deps legados (🔗 palavras) → (🔗 #NNN)
      buildDependencyMap(); // resolve deps com estado atual
      sections.forEach(s => {
        (tasks[s.id] || []).forEach(task => {
          if (!task.dependsOn || task.dependsOn.length === 0) return;
          const hasLegacy = task.dependsOn.some(d => !d.trim().match(/^#\d+$/));
          if (!hasLegacy) return;

          const dep = depMap[task.id] || { blockedByIds: [] };
          const dIdx = task.title.indexOf('🔗');
          if (dIdx === -1) return;

          const baseTitle = task.title.slice(0, dIdx).trimEnd();
          // Reconstrói refs com IDs
          const newRefs = dep.blockedByIds.map(bid => {
            const blocker = taskFlatMap[bid];
            return blocker && blocker.taskId != null
              ? `🔗 #${String(blocker.taskId).padStart(4, '0')}`
              : null;
          }).filter(Boolean);

          // Mantém deps que não foram resolvidas (evita perda de dados)
          const unresolvedLegacy = task.dependsOn.filter(d => {
            if (d.trim().match(/^#\d+$/)) return false;
            const needle = d.toLowerCase().trim();
            const found = Object.values(taskFlatMap).find(o =>
              depWordMatch(o.title, needle) ||
              getDisplayTitle(o.title).toLowerCase().includes(needle)
            );
            return !found; // mantém apenas os que NÃO foram resolvidos
          }).map(d => `🔗 ${d}`);

          const allRefs = [...newRefs, ...unresolvedLegacy];
          task.title = baseTitle + (allRefs.length ? ' ' + allRefs.join(' ') : '');

          // Reconstrói dependsOn
          const newDIdx = task.title.indexOf('🔗');
          task.dependsOn = [];
          if (newDIdx !== -1) {
            task.title.slice(newDIdx).split('🔗').slice(1).forEach(p => {
              const d = p.replace(/^\s*depende:\s*/i, '').split(/[\[\n]/)[0].trim();
              if (d) task.dependsOn.push(d);
            });
          }
          anyChange = true;
        });
      });

      // Passo 4: adicionar (adicionado: YYYY-MM-DD) a tarefas sem data de criação
      const todayStr = new Date().toISOString().slice(0, 10);
      sections.forEach(s => {
        (tasks[s.id] || []).forEach(t => {
          if (/\(adicionado:\s*\d{4}-\d{2}-\d{2}\)/i.test(t.title)) return;
          // Insere antes de 🔗 (se existir) ou no final
          const dIdx = t.title.indexOf('🔗');
          t.title = dIdx !== -1
            ? t.title.slice(0, dIdx).trimEnd() + ` (adicionado: ${todayStr}) ` + t.title.slice(dIdx)
            : t.title.trimEnd() + ` (adicionado: ${todayStr})`;
          anyChange = true;
        });
      });

      if (anyChange) markChanged();
    }

    function _depPickerUpdateList(filter) {

    // Called after add/remove — preserves current search filter
    function renderDepPicker(filter) {
      _depPickerUpdateCurDeps();

    function addDependency(fromId, toId) {
      const task = taskFlatMap[fromId];
      const depTask = taskFlatMap[toId];
      if (!task || !depTask) return;
      const dep = depMap[fromId];
      if (dep && dep.blockedByIds.some(bid => String(bid) === String(toId))) return;

      // Usa ID persistente se disponível; caso contrário, fallback pelas 4 primeiras palavras
      const key = depTask.taskId != null
        ? `#${String(depTask.taskId).padStart(4, '0')}`
        : getDisplayTitle(depTask.title).replace(/[^\w\s\u00C0-\u024F]/g, ' ').trim().split(/\s+/).slice(0, 4).join(' ');
      task.title = task.title.trimEnd() + ' 🔗 ' + key;
      // Rebuild dependsOn
      const idx = task.title.indexOf('🔗');
      task.dependsOn = [];
      if (idx !== -1) task.title.slice(idx).split('🔗').slice(1).forEach(p => {
        let d = p.replace(/^\s*depende:\s*/i, '').split(/[\[\n]/)[0].trim();
        if (d) task.dependsOn.push(d);
      });

      markChanged(); buildDependencyMap(); renderTasks(); renderDepPicker('');
    }

    function removeDependency(fromId, toId) {
      const task = taskFlatMap[fromId];
      if (!task) return;
      const depIdx = task.title.indexOf('🔗');
      if (depIdx === -1) return;

      const segments = [];
      task.title.slice(depIdx).split('🔗').slice(1).forEach(p => {
        let seg = p.replace(/^\s*depende:\s*/i, '').split(/[\[\n]/)[0].trim();
        if (seg) segments.push(seg);
      });

      for (const seg of segments) {
        let resolved = null;
        const idMatch = seg.trim().match(/^#(\d+)$/);
        if (idMatch) {
          // Novo formato: matching por ID persistente
          resolved = taskIdMap[parseInt(idMatch[1], 10)];
        } else {
          // Formato legado: matching por palavras
          const needle = seg.toLowerCase();
          resolved = Object.values(taskFlatMap).find(o =>
            o.id !== fromId && depWordMatch(o.title, needle)
          ) || Object.values(taskFlatMap).find(o =>
            o.id !== fromId && getDisplayTitle(o.title).toLowerCase().includes(needle)
          );
        }
        if (resolved && String(resolved.id) === String(toId)) {
          const esc = seg.replace(/[.*+?^${}()|[\]\\]/g, '\\$&');
          task.title = task.title.replace(
            new RegExp('\\s*🔗\\s*(?:depende:\\s*)?' + esc + '(?=\\s*\\[|\\s*🔗|\\s*$)', 'gi'), ''
          ).trim();
          // Rebuild dependsOn
          const newIdx = task.title.indexOf('🔗');
          task.dependsOn = [];
          if (newIdx !== -1) task.title.slice(newIdx).split('🔗').slice(1).forEach(p => {
            let d = p.replace(/^\s*depende:\s*/i, '').split(/[\[\n]/)[0].trim();
            if (d) task.dependsOn.push(d);
          });
          markChanged(); buildDependencyMap(); renderTasks(); renderDepPicker('');
          return;
        }
      }
    }
    // ===== fim Dependency Picker =====

    // ===== fim Dependency system =====

    const board = document.getElementById('board');
    const listView = document.getElementById('listView');
    const boardViewBtn = document.getElementById('boardViewBtn');

    function taskSectionId(name) {
      return name.toLowerCase().replace(/[^a-z0-9]+/g, '-').replace(/^-|-$/g, '');
    }

    function parseTaskMarkdown(content) {
      const resultSections = [];
      const resultTasks = {};
      let currentSection = null;
      let currentSectionId = null;

      const lines = content.replace(/\r\n/g, '\n').replace(/\r/g, '\n').split('\n');
      let currentTask = null;

      for (const line of lines) {
        const headerMatch = line.match(/^## \*{0,2}(.+?)\*{0,2}$/);
        if (headerMatch) {
          if (currentTask && currentSectionId) {
            resultTasks[currentSectionId].push(currentTask);
            currentTask = null;
          }

          const sectionName = headerMatch[1].trim();
          currentSectionId = taskSectionId(sectionName);
          currentSection = sectionName;

          if (!resultTasks[currentSectionId]) {
            // Parse MoSCoW from section name, e.g. "Carreira [Must]"
            const secMoscowMatch = sectionName.match(/\[(Must|Should|Could|Won'?t)\]/i);
            const secMoscow = secMoscowMatch
              ? secMoscowMatch[1].toLowerCase().replace("'", '').replace('wont', 'wont')
              : '';
            resultSections.push({ id: currentSectionId, name: sectionName, moscow: secMoscow });
            resultTasks[currentSectionId] = [];
          }
        } else if (currentSectionId && line.match(/^- \[[ xX\/\-]\]/)) {
          if (currentTask) {
            resultTasks[currentSectionId].push(currentTask);
          }
          const checked = line.match(/\[[xX]\]/) !== null;
          const inProgress = line.match(/\[[\-\/]\]/) !== null;
          let text = line.replace(/^- \[[ xX\/\-]\]\s*/, '');
          let title = text;
          let note = '';

          const boldMatch = text.match(/^\*\*(.+?)\*\*(.*)$/);
          if (boldMatch) {
            title = boldMatch[1];
            note = boldMatch[2].replace(/^\s*-\s*/, '').trim();
          }

          // Extract MoSCoW priority from title
          const moscowMatch = title.match(/\[(Must|Should|Could|Won'?t)\]/i);
          const moscow = moscowMatch
            ? moscowMatch[1].toLowerCase().replace("'", '').replace('wont', 'wont')
            : '';

          // Extract Modo de Execução from title
          const modoMatch = title.match(/\[(Delegar|Colaborar|Automatizar|Manual)\]/i);
          const modo = modoMatch ? modoMatch[1].toLowerCase() : '';

          // Extract Esforço from title: [Rápido] | [Médio] | [Longo]
          const esforcoMatch = title.match(/\[(R[áa]pido|M[ée]dio|Longo)\]/i);
          const esforco = esforcoMatch
            ? esforcoMatch[1].toLowerCase()
                .replace('á','a').replace('â','a').replace('é','e').replace('ê','e')  // normalise accents
            : '';

          // Extract deadline from title: [prazo: YYYY-MM-DD]
          const prazoMatch = title.match(/\[prazo:\s*(\d{4}-\d{2}-\d{2})\]/i);
          const deadline = prazoMatch ? prazoMatch[1] : '';

          // Extract creation date from title: (adicionado: YYYY-MM-DD)
          const addedMatch = title.match(/\(adicionado:\s*(\d{4}-\d{2}-\d{2})\)/i);
          const addedDate = addedMatch ? addedMatch[1] : '';

          // Extract persistent task ID: [#NNN]
          const taskIdMatch = title.match(/\[#(\d+)\]/);
          const taskId = taskIdMatch ? parseInt(taskIdMatch[1], 10) : null;

          // Extract dependencies: 🔗 #NNN (novo) ou 🔗 Texto (legado)
          const dependsOn = [];
          const depIdx = title.indexOf('🔗');
          if (depIdx !== -1) {
            title.slice(depIdx).split('🔗').slice(1).forEach(part => {
              let dep = part.replace(/^\s*depende:\s*/i, '').trim();
              dep = dep.split(/[\[\n]/)[0].trim();
              if (dep) dependsOn.push(dep);
            });
          }

          currentTask = {
            id: Date.now() + Math.random(),
            taskId,
            title,
            note,
            checked,
            inProgress: inProgress || false,
            moscow,
            modo,
            esforco,
            deadline,
            addedDate,
            dependsOn,
            subtasks: [],
            section: currentSectionId
          };
        } else if (currentTask && line.match(/^\s+- \[[ xX]\]/)) {
          const checked = line.match(/\[[xX]\]/) !== null;
          const text = line.replace(/^\s+- \[[ xX]\]\s*/, '');
          currentTask.subtasks.push({ text, checked });
        }
      }

      if (currentTask && currentSectionId) {
        resultTasks[currentSectionId].push(currentTask);
      }

      return { sections: resultSections, tasks: resultTasks };
    }

    function toMarkdown() {
      let md = '# Tasks\n';

      sections.forEach((section, idx) => {
        md += `\n## ${section.name}\n`;
        const sectionTasks = tasks[section.id] || [];
        sectionTasks.forEach(t => {
          const checkbox = t.checked ? '[x]' : t.inProgress ? '[-]' : '[ ]';
          const note = t.note ? ` - ${t.note}` : '';
          md += `- ${checkbox} **${t.title}**${note}\n`;
          t.subtasks.forEach(st => {
            const stCheckbox = st.checked ? '[x]' : '[ ]';
            md += `  - ${stCheckbox} ${st.text}\n`;
          });
        });
      });

      return md.trimEnd() + '\n';
    }

    function createCard(task) {
      const card = document.createElement('div');

      card.draggable = true;
      card.dataset.id = task.id;
      card.dataset.taskId = task.id; // para scrollToTask

      // Dependency state
      const dep = depMap[task.id] || { blockedByIds: [], unlocksIds: [] };
      const activeBlockers = dep.blockedByIds.filter(id => taskFlatMap[id] && !taskFlatMap[id].checked);
      const isBlocked = activeBlockers.length > 0;
      if (isBlocked) card.classList.add('dep-blocked');

      const displayTitle = getDisplayTitle(task.title);

      let html = `
        <div style="display: flex; align-items: flex-start; gap: 12px;">
          <button class="delete-btn" data-action="delete" title="Delete task">&times;</button>
          <span class="checkbox ${task.checked ? 'checked' : ''}" data-action="toggle"></span>
          <div class="card-title" data-action="edit-title">${displayTitle}</div>
        </div>
      `;

      if (task.note) {
        html += `<div class="card-note" data-action="edit-note" style="cursor: pointer; margin-left: 30px;">${task.note}</div>`;
      } else {
        html += `<div class="card-note add-on-hover" data-action="edit-note" style="cursor: pointer; margin-left: 30px; font-style: italic;">+ Add note</div>`;
      }

      // Priority badge (shown in all views except MoSCoW where the column already says it)
      { const labelMap = { must: 'Must', should: 'Should', could: 'Could', wont: "Won't" };
        if (task.moscow) {
          html += `<span class="moscow-badge moscow-${task.moscow}" data-action="pick-moscow" title="Mudar prioridade MoSCoW">${labelMap[task.moscow] || task.moscow}</span>`;
        } else {
          html += `<span class="badge-add add-on-hover" data-action="pick-moscow" title="Definir prioridade MoSCoW">+ MoSCoW</span>`;
        }
      }

      // Modo de Execução badge
      { const modoIconMap  = { delegar: '🤖', colaborar: '🤝', automatizar: '⚡', manual: '✋' };
        const modoLabelMap = { delegar: 'Delegar', colaborar: 'Colaborar', automatizar: 'Automatizar', manual: 'Manual' };
        if (task.modo) {
          html += `<span class="modo-badge modo-${task.modo}" data-action="pick-modo" title="Mudar modo de execução">${modoIconMap[task.modo] || ''} ${modoLabelMap[task.modo] || task.modo}</span>`;
        } else {
          html += `<span class="badge-add add-on-hover" data-action="pick-modo" title="Definir modo de execução">+ Modo</span>`;
        }
      }

      // Esforço badge
      { const esforcoLabelMap = { rapido: '⚡ Rápido', medio: '⏱ Médio', longo: '🏋 Longo' };
        if (task.esforco) {
          html += `<span class="esforco-badge esforco-${task.esforco}" data-action="pick-esforco" title="Mudar esforço estimado" style="cursor:pointer">${esforcoLabelMap[task.esforco] || task.esforco}</span>`;
        } else {
          html += `<span class="badge-add add-on-hover" data-action="pick-esforco" title="Definir esforço estimado">+ Esforço</span>`;
        }
      }

      // Status Kanban badge (sempre visível)
      { const statusVal = task.checked ? 'done' : task.inProgress ? 'doing' : 'todo';
        const statusLabel = { todo: '○ A Fazer', doing: '◑ Em Andamento', done: '● Concluído' };
        html += `<span class="status-badge status-badge-${statusVal}" data-action="pick-status" title="Mudar status">${statusLabel[statusVal]}</span>`;
      }

      // Dependency chips
      if (isBlocked) {
        html += `<button class="dep-chip dep-chip-blocked" data-action="show-blocked">🔒 ${activeBlockers.length}</button>`;
      }
      if (dep.unlocksIds.length > 0) {
        html += `<button class="dep-chip dep-chip-key" data-action="show-unlocks">🔑 ${dep.unlocksIds.length}</button>`;
      }
      // Botão de gestão de dependências
      html += `<button class="dep-add-btn" data-action="open-dep-picker">🔗</button>`;

      if (task.subtasks.length > 0) {
        html += '<div class="card-subtasks" style="margin-left: 30px;">';
        task.subtasks.forEach((st, idx) => {
          html += `<div class="subtask">
            <span class="checkbox ${st.checked ? 'checked' : ''}" data-action="toggle-sub" data-idx="${idx}" style="width: 16px; height: 16px; min-width: 16px; min-height: 16px;"></span>
            <span data-action="edit-subtask" data-idx="${idx}" style="cursor: pointer;">${st.text}</span>
          </div>`;
        });
        html += `<div class="subtask add-on-hover" data-action="add-subtask" style="color: var(--text-muted); cursor: pointer; font-style: italic; padding-left: 24px;">+ Add subtask</div>`;
        html += '</div>';
      } else {
        html += `<div class="card-subtasks add-on-hover" style="margin-left: 30px;">
          <div class="subtask" data-action="add-subtask" style="color: var(--text-muted); cursor: pointer; font-style: italic;">+ Add subtask</div>
        </div>`;
      }

      card.innerHTML = html;

      card.addEventListener('dragstart', (e) => {
        card.classList.add('dragging');
        e.dataTransfer.setData('text/plain', task.id);
      });

      card.addEventListener('dragend', () => {
        card.classList.remove('dragging');
      });

      card.addEventListener('click', (e) => {
        const action = e.target.dataset.action;
        if (action === 'toggle') {
          task.checked = !task.checked;
          markChanged();
          renderTasks();
        } else if (action === 'toggle-sub') {
          const idx = parseInt(e.target.dataset.idx);
          task.subtasks[idx].checked = !task.subtasks[idx].checked;
          markChanged();
          renderTasks();
        } else if (action === 'edit-title') {
          startEditingTitle(e.target, task);
        } else if (action === 'edit-note') {
          startEditingNote(e.target, task);
        } else if (action === 'edit-subtask') {
          const idx = parseInt(e.target.dataset.idx);
          startEditingSubtask(e.target, task, idx);
        } else if (action === 'add-subtask') {
          startAddingSubtask(e.target, task);
        } else if (action === 'delete') {
          deleteTask(task);
        } else if (action === 'show-blocked') {
          e.stopPropagation();
          showDepModal(task.id, 'blocked');
        } else if (action === 'show-unlocks') {
          e.stopPropagation();
          showDepModal(task.id, 'unlocks');
        } else if (action === 'open-dep-picker') {
          e.stopPropagation();
          showDepPicker(task.id);
        } else if (action === 'pick-moscow') {
          e.stopPropagation();
          showTagPicker(e.target, task, 'moscow');
        } else if (action === 'pick-modo') {
          e.stopPropagation();
          showTagPicker(e.target, task, 'modo');
        } else if (action === 'pick-esforco') {
          e.stopPropagation();
          showTagPicker(e.target, task, 'esforco');
        } else if (action === 'pick-status') {
          e.stopPropagation();
          showTagPicker(e.target, task, 'status');
        }
      });

      return card;
    }

    function startEditingTitle(titleEl, task) {
      const input = document.createElement('input');
      input.type = 'text';
      input.value = task.title;
      input.style.cssText = 'width: 100%; background: var(--bg-card); border: 2px solid var(--accent); border-radius: 6px; padding: 6px 10px; color: var(--text-primary); font-size: 14px; font-family: inherit; outline: none;';

      titleEl.replaceWith(input);
      input.focus();
      input.select();

      let saved = false;
      const saveEdit = () => {
        if (saved) return;
        saved = true;
        const newTitle = input.value.trim();
        if (newTitle && newTitle !== task.title) {
          task.title = newTitle;
          markChanged();
        }
        renderTasks();
      };

      input.addEventListener('keydown', (e) => {
        if (e.key === 'Enter') { e.preventDefault(); saveEdit(); }
        else if (e.key === 'Escape') { saved = true; renderTasks(); }
      });
      input.addEventListener('blur', saveEdit);
    }

    function startAddingSubtask(el, task) {

      input.style.cssText = 'width: calc(100% - 10px); background: var(--bg-card); border: 2px solid var(--accent); border-radius: 4px; padding: 2px 6px; color: var(--text-primary); font-size: 13px; font-family: inherit; outline: none;';

      el.replaceWith(input);

      let saved = false;
      const saveEdit = () => {
        if (saved) return;
        saved = true;

    function startEditingColumnTitle(titleEl, colId) {
      const section = sections.find(s => s.id === colId);
      if (!section) return;

      const input = document.createElement('input');
      input.type = 'text';
      input.value = section.name;
      input.style.cssText = 'width: 180px; background: var(--bg-card); border: 2px solid var(--accent); border-radius: 6px; padding: 4px 10px; color: var(--text-primary); font-size: 13px; font-weight: 600; text-transform: uppercase; letter-spacing: 0.05em; font-family: inherit; outline: none;';

      titleEl.replaceWith(input);
      input.focus();
      input.select();

      let saved = false;
      const saveEdit = () => {
        if (saved) return;
        saved = true;
        const newName = input.value.trim();
        if (newName && newName !== section.name) {
          const oldId = section.id;
          section.name = newName;
          const newId = taskSectionId(newName);
          if (newId !== oldId) {
            tasks[newId] = tasks[oldId] || [];
            delete tasks[oldId];
            tasks[newId].forEach(t => t.section = newId);
            section.id = newId;
          }
          markChanged();
        }
        renderTasks();
      };

      input.addEventListener('keydown', (e) => {
        if (e.key === 'Enter') { e.preventDefault(); saveEdit(); }
        else if (e.key === 'Escape') { saved = true; renderTasks(); }

    function createColumn(id, title, items) {
      const col = document.createElement('div');
      col.className = 'column';
      col.innerHTML = `
        <div class="column-header">
          <span class="column-title" data-section-id="${id}" style="cursor: pointer;">${title}</span>
          <span class="count">${items.length}</span>
        </div>
        <div class="cards" data-column="${id}"></div>
        <div class="add-card">
          <button data-add="${id}">+ Add task</button>
        </div>
      `;

      col.querySelector('.column-title').addEventListener('click', (e) => {
        if (!col.dragging) { startEditingColumnTitle(e.target, id); }
      });

      const header = col.querySelector('.column-header');
      header.draggable = true;

      header.addEventListener('dragstart', (e) => {
        e.stopPropagation();
        col.classList.add('dragging-column');
        e.dataTransfer.setData('text/column', id);
        e.dataTransfer.effectAllowed = 'move';
      });

      header.addEventListener('dragend', () => {
        col.classList.remove('dragging-column');
        board.querySelectorAll('.column-drop-indicator').forEach(el => el.remove());
      });

      col.addEventListener('dragover', (e) => {
        if (e.dataTransfer.types.includes('text/column')) {
          e.preventDefault();
          e.stopPropagation();
          board.querySelectorAll('.column-drop-indicator').forEach(el => el.remove());
          const indicator = document.createElement('div');
          indicator.className = 'column-drop-indicator';
          const rect = col.getBoundingClientRect();
          if (e.clientX < rect.left + rect.width / 2) { col.before(indicator); }
          else { col.after(indicator); }
        }
      });

      col.addEventListener('drop', (e) => {
        if (e.dataTransfer.types.includes('text/column')) {
          e.preventDefault();
          e.stopPropagation();
          const fromId = e.dataTransfer.getData('text/column');
          const toId = id;
          if (fromId !== toId) {
            const rect = col.getBoundingClientRect();
            const insertBefore = e.clientX < rect.left + rect.width / 2;
            moveSection(fromId, toId, insertBefore);
          }
          board.querySelectorAll('.column-drop-indicator').forEach(el => el.remove());
        }
      });

      const cardsContainer = col.querySelector('.cards');
      items.forEach(task => { cardsContainer.appendChild(createCard(task)); });

      const getDropPosition = (e) => {
        const allCards = [...cardsContainer.querySelectorAll('.task-card')];
        const visibleCards = allCards.filter(c => !c.classList.contains('dragging'));
        let insertBeforeCard = null;
        let dropIndex = visibleCards.length;
        for (let i = 0; i < visibleCards.length; i++) {
          const rect = visibleCards[i].getBoundingClientRect();
          if (e.clientY < rect.top + rect.height / 2) {
            insertBeforeCard = visibleCards[i];
            dropIndex = i;
            break;
          }
        }
        return { insertBeforeCard, dropIndex };
      };

      const showDropIndicator = (e) => {
        col.querySelectorAll('.drop-indicator').forEach(el => el.remove());
        const { insertBeforeCard } = getDropPosition(e);
        const indicator = document.createElement('div');
        indicator.className = 'drop-indicator';
        indicator.style.cssText = 'height: 3px; background: var(--accent); border-radius: 2px; margin: 5px 0;';
        if (insertBeforeCard) { cardsContainer.insertBefore(indicator, insertBeforeCard); }
        else { cardsContainer.appendChild(indicator); }
      };

      col.addEventListener('dragover', (e) => {
        e.preventDefault();
        cardsContainer.classList.add('drag-over');
        showDropIndicator(e);
      });

      col.addEventListener('dragleave', (e) => {
        if (!col.contains(e.relatedTarget)) {
          cardsContainer.classList.remove('drag-over');
          col.querySelectorAll('.drop-indicator').forEach(el => el.remove());
        }
      });

      col.addEventListener('drop', (e) => {
        e.preventDefault();
        cardsContainer.classList.remove('drag-over');
        col.querySelectorAll('.drop-indicator').forEach(el => el.remove());
        const taskId = parseFloat(e.dataTransfer.getData('text/plain'));
        const { dropIndex } = getDropPosition(e);
        moveTask(taskId, id, dropIndex);
      });

      col.querySelector(`[data-add="${id}"]`).addEventListener('click', () => {
        addNewTask(id, col.querySelector('.cards'));
      });

      return col;
    }

    function addNewTask(sectionId, container) {
      const existing = container.querySelector('.new-task-input');
      if (existing) return;

      const input = document.createElement('textarea');
      input.className = 'new-task-input';
      input.placeholder = 'What needs to be done?';
      input.rows = 2;
      container.appendChild(input);
      input.focus();

      input.addEventListener('keydown', (e) => {
        if (e.key === 'Enter' && !e.shiftKey) {
          e.preventDefault();
          const title = input.value.trim();
          if (title) {
            if (!tasks[sectionId]) tasks[sectionId] = [];
            tasks[sectionId].push({
              id: Date.now() + Math.random(),
              title,
              note: '',
              checked: false,
              subtasks: [],
              section: sectionId
            });
            markChanged();
            renderTasks();
          } else { input.remove(); }
        } else if (e.key === 'Escape') { input.remove(); }
      });

      input.addEventListener('blur', () => { setTimeout(() => input.remove(), 100); });
    }

    function moveSection(fromId, toId, insertBefore) {
      const fromIdx = sections.findIndex(s => s.id === fromId);
      const toIdx = sections.findIndex(s => s.id === toId);
      if (fromIdx === -1 || toIdx === -1) return;
      const [section] = sections.splice(fromIdx, 1);
      let newIdx = sections.findIndex(s => s.id === toId);
      if (!insertBefore) newIdx++;
      sections.splice(newIdx, 0, section);
      markChanged();
      renderTasks();
    }

    function moveTask(taskId, toSectionId, dropIndex = -1) {
      let task = null;
      for (const section of sections) {
        const sectionTasks = tasks[section.id] || [];
        const idx = sectionTasks.findIndex(t => t.id === taskId);
        if (idx !== -1) {
          task = sectionTasks.splice(idx, 1)[0];
          break;
        }
      }
      if (!task) return;
      task.section = toSectionId;
      if (!tasks[toSectionId]) tasks[toSectionId] = [];
      if (dropIndex >= 0 && dropIndex <= tasks[toSectionId].length) {
        tasks[toSectionId].splice(dropIndex, 0, task);
      } else {
        tasks[toSectionId].push(task);
      }
      markChanged();
      renderTasks();
    }

    function deleteTask(task) {
      if (!confirm(`Delete "${task.title}"?`)) return;
      for (const section of sections) {
        const sectionTasks = tasks[section.id] || [];
        const idx = sectionTasks.findIndex(t => t.id === task.id);
        if (idx !== -1) { sectionTasks.splice(idx, 1); break; }
      }
      markChanged();
      renderTasks();
    }

    let saveTimeout = null;
    let lastModified = 0;
    let watchInterval = null;
    let isSaving = false;

    function markChanged() {
      hasChanges = true;
      saveBtn.disabled = false;
      if (saveTimeout) clearTimeout(saveTimeout);
      saveTimeout = setTimeout(autoSave, 500);
    }

    async function autoSave() {
      if (!hasChanges || isSaving) return;
      if (!IS_HTTP && !taskFileHandle) return;
      isSaving = true;
      try {
        if (IS_HTTP) {
          await httpSave(DEFAULT_TASKS_FILE, toMarkdown());
          lastModified = Date.now(); // Evita que o watcher detecte o próprio save como mudança externa
        } else {
          const writable = await taskFileHandle.createWritable();
          const content = toMarkdown();
          await writable.write(content);
          await writable.close();
          const file = await taskFileHandle.getFile();
          lastModified = file.lastModified;
        }
        hasChanges = false;
        saveBtn.disabled = true;
        showStatus('Saved');
      } catch (e) {
        showErrorModal('Falha ao salvar: ' + e.message);
      }
      isSaving = false;
    }

    async function checkForExternalChanges() {
      if (hasChanges || isSaving) return;
      try {
        if (IS_HTTP) {
          const response = await fetch('./' + DEFAULT_TASKS_FILE, { cache: 'no-store' });
          if (!response.ok) return;
          const serverMod = new Date(response.headers.get('Last-Modified') || 0).getTime();
          if (serverMod > lastModified) {
            lastModified = serverMod;
            const content = await response.text();
            loadParsedContent(content);
            renderTasks();
            showStatus('Reloaded');
          }
        } else {
          if (!taskFileHandle) return;
          const file = await taskFileHandle.getFile();
          if (file.lastModified > lastModified) {
            lastModified = file.lastModified;
            const content = await file.text();
            loadParsedContent(content);
            renderTasks();
            showStatus('Reloaded');
          }
        }
      } catch (e) { console.log('Watch error:', e); }
    }

    function startWatching() {
      if (watchInterval) clearInterval(watchInterval);
      watchInterval = setInterval(checkForExternalChanges, 1000);
    }

    function stopWatching() {
      if (watchInterval) { clearInterval(watchInterval); watchInterval = null; }
    }

    function renderTasks() {
      // Salva posição de scroll de todas as colunas e da list view antes de redesenhar
      const colScrolls = [];
      board.querySelectorAll('.cards').forEach(el => colScrolls.push(el.scrollTop));
      const listScrollTop = listView.scrollTop;

      buildDependencyMap(); // Reconstrói o mapa a cada render
      renderProjectFilterBar();

      if (currentView === 'board')           { renderBoard(); }
      else if (currentView === 'kanban')     { renderKanban(); }
      else if (currentView === 'moscow')     { renderMoscow(); }
      else if (currentView === 'modo')       { renderModo(); }
      else if (currentView === 'esforco')    { renderEsforco(); }
      else if (currentView === 'prioridade') { renderPrioridade(); }
      else if (currentView === 'calendario') { renderCalendario(); }
      else { renderBoard(); }

      // Restaura scroll das colunas (mesma ordem de renderização)
      board.querySelectorAll('.cards').forEach((el, i) => {
        if (colScrolls[i]) el.scrollTop = colScrolls[i];
      });
      listView.scrollTop = listScrollTop;
    }

    function renderDependencias() {
      board.style.display = 'flex';
      board.innerHTML = '';

      // Encontra tarefas raiz: têm dependentes mas não estão bloqueadas
      const roots = Object.keys(depMap)
        .filter(id => depMap[id].unlocksIds.length > 0)
        .map(id => taskFlatMap[id])
        .filter(Boolean);

      if (roots.length === 0) {
        board.innerHTML = `<div style="padding:60px;color:var(--text-muted);text-align:center;width:100%;">
          <div style="font-size:2rem;margin-bottom:12px;">🔗</div>
          <div style="font-weight:600;margin-bottom:6px;">Nenhuma dependência cadastrada</div>
          <div style="font-size:13px;">Adicione <code style="background:var(--bg-secondary);padding:2px 6px;border-radius:4px;">🔗 Nome da Tarefa</code> no título de uma tarefa para criar uma dependência.</div>
        </div>`;
        return;
      }

      const wrap = document.createElement('div');
      wrap.className = 'deps-view-wrap';

      roots.forEach(root => {
        const dep = depMap[root.id];
        const dependents = dep.unlocksIds.map(id => taskFlatMap[id]).filter(Boolean);
        const doneCount = dependents.filter(t => t.checked).length;
        const rootDone = root.checked;

        const chain = document.createElement('div');
        chain.className = 'dep-chain';

        const dotColor = rootDone ? 'var(--accent)' : 'var(--bg-secondary)';
        const dotBorder = rootDone ? 'var(--accent)' : 'var(--border)';
        const dotContent = rootDone ? '✓' : '';
        const rootStyle = rootDone ? 'text-decoration:line-through;color:var(--text-muted)' : '';

        chain.innerHTML = `
          <div class="dep-chain-root">
            <div class="dep-chain-dot" style="background:${dotColor};border:2px solid ${dotBorder};">${dotContent}</div>
            <span style="${rootStyle}">${getDisplayTitle(root.title)}</span>
            <span style="margin-left:auto;font-size:11px;color:var(--text-muted);font-weight:400;">${doneCount}/${dependents.length} concluídas</span>
          </div>
          <div class="dep-chain-children">
            ${dependents.map(t => {
              const done = t.checked;
              return `<div class="dep-tree-item" style="justify-content:space-between;">
                <div style="display:flex;align-items:center;gap:8px;flex:1;cursor:pointer;min-width:0;" onclick="scrollToTask('${t.id}')">
                  <div class="dep-tree-item-check ${done ? 'done' : ''}"></div>
                  <span style="font-size:13px;${done ? 'text-decoration:line-through;color:var(--text-muted)' : ''}">${getDisplayTitle(t.title)}</span>
                </div>
                <button onclick="removeDependency('${t.id}','${root.id}')"
                  title="Remover dependência"
                  style="flex-shrink:0;background:none;border:1px solid transparent;cursor:pointer;color:var(--text-muted);font-size:13px;padding:2px 6px;border-radius:4px;margin-left:8px;line-height:1;"
                  onmouseover="this.style.color='#e74c3c';this.style.borderColor='rgba(231,76,60,0.4)';this.style.background='rgba(231,76,60,0.08)'"
                  onmouseout="this.style.color='var(--text-muted)';this.style.borderColor='transparent';this.style.background='none'">✕</button>
              </div>`;
            }).join('')}
          </div>`;

        wrap.appendChild(chain);
      });

      board.appendChild(wrap);
    }

    function setTaskStatus(taskId, status) {
      for (const section of sections) {
        const sectionTasks = tasks[section.id] || [];
        const task = sectionTasks.find(t => t.id === taskId);
        if (task) {
          if (status === 'todo')  { task.checked = false; task.inProgress = false; }
          if (status === 'doing') { task.checked = false; task.inProgress = true;  }
          if (status === 'done')  { task.checked = true;  task.inProgress = false; }
          markChanged();
          renderTasks();
          return;
        }
      }
    }

    function renderKanban() {
      board.innerHTML = '';

      // Gather all tasks with their section name and reference
      const allTasks = [];
      getActiveSections().forEach(section => {
        (tasks[section.id] || []).forEach(task => {
          allTasks.push(Object.assign({}, task, { _sectionName: section.name, _section: section }));
        });
      });

      const sortByScore = arr => sortByScoreBlockedLast(arr);
      const todoTasks  = sortByScore(allTasks.filter(t => !t.checked && !t.inProgress));
      const doingTasks = sortByScore(allTasks.filter(t => !t.checked &&  t.inProgress));
      const doneTasks  = sortByScore(allTasks.filter(t =>  t.checked));

      const cols = [
        { id: 'kanban-todo',  label: 'A Fazer',       items: todoTasks,  cls: 'kanban-col-todo',  status: 'todo'  },
        { id: 'kanban-doing', label: 'Em Andamento',  items: doingTasks, cls: 'kanban-col-doing', status: 'doing' },
        { id: 'kanban-done',  label: 'Concluído',     items: doneTasks,  cls: 'kanban-col-done',  status: 'done'  },
      ];

      cols.forEach(({ id, label, items, cls, status }) => {
        const col = document.createElement('div');
        col.className = `column ${cls}`;
        col.innerHTML = `
          <div class="column-header">
            <span class="column-title">${label}</span>
            <span class="count">${items.length}</span>
          </div>
          <div class="cards" data-kanban-col="${status}"></div>
        `;

        const cardsContainer = col.querySelector('.cards');

        items.forEach(taskData => {
          // Find original task reference
          let task = null;
          for (const sec of sections) {
            task = (tasks[sec.id] || []).find(t => t.id === taskData.id);
            if (task) break;
          }
          if (!task) return;

          const card = createCard(task);

          // Add category tag
          const tag = document.createElement('div');
          tag.className = 'card-category-tag';
          // Strip emojis and clean section name
          const secName = taskData._sectionName.replace(/[\u{1F300}-\u{1FAFF}]|[\u2600-\u27FF]/gu, '').trim();
          tag.textContent = secName;
          tag.title = taskData._sectionName;
          card.appendChild(tag);

          cardsContainer.appendChild(card);
        });

        // Drag-over / drop for status change
        col.addEventListener('dragover', (e) => {
          e.preventDefault();
          cardsContainer.classList.add('drag-over');
        });
        col.addEventListener('dragleave', (e) => {
          if (!col.contains(e.relatedTarget)) cardsContainer.classList.remove('drag-over');
        });
        col.addEventListener('drop', (e) => {
          e.preventDefault();
          cardsContainer.classList.remove('drag-over');
          const taskId = parseFloat(e.dataTransfer.getData('text/plain'));
          if (!isNaN(taskId)) setTaskStatus(taskId, status);
        });

        board.appendChild(col);
      });
    }

    // ===== MoSCoW VIEW =====
    // ===== TAG PICKER (MoSCoW / Modo) =====
    function showTagPicker(anchorEl, task, type) {
      document.querySelectorAll('.tag-picker-popup').forEach(el => el.remove());

      const opts = type === 'moscow'
        ? [
            { value: 'must',   label: 'Must',         cls: 'opt-must' },
            { value: 'should', label: 'Should',        cls: 'opt-should' },
            { value: 'could',  label: 'Could',         cls: 'opt-could' },
            { value: 'wont',   label: "Won't",         cls: 'opt-wont' },
            { value: '',       label: '✕ Remover tag', cls: 'opt-remove' },
          ]
        : type === 'esforco'
        ? [
            { value: 'rapido', label: '⚡ Rápido',    cls: 'opt-rapido' },
            { value: 'medio',  label: '⏱ Médio',     cls: 'opt-medio' },
            { value: 'longo',  label: '🏋 Longo',     cls: 'opt-longo' },
            { value: '',       label: '✕ Remover tag', cls: 'opt-remove' },
          ]
        : type === 'status'
        ? [
            { value: 'todo',  label: '○ A Fazer',      cls: 'opt-status-todo' },
            { value: 'doing', label: '◑ Em Andamento', cls: 'opt-status-doing' },
            { value: 'done',  label: '● Concluído',    cls: 'opt-status-done' },
          ]
        : [
            { value: 'delegar',     label: '🤖 Delegar',     cls: 'opt-delegar' },
            { value: 'colaborar',   label: '🤝 Colaborar',   cls: 'opt-colaborar' },
            { value: 'automatizar', label: '⚡ Automatizar', cls: 'opt-automatizar' },
            { value: 'manual',      label: '✋ Manual',      cls: 'opt-manual' },
            { value: '',            label: '✕ Remover tag',  cls: 'opt-remove' },
          ];

      const popup = document.createElement('div');
      popup.className = 'tag-picker-popup';

      opts.forEach(opt => {
        const btn = document.createElement('button');
        btn.className = `tag-picker-opt ${opt.cls}`;
        btn.textContent = opt.label;
        // Determina valor atual para marcar selecionado
        let cur;
        if (type === 'moscow') cur = task.moscow;
        else if (type === 'esforco') cur = task.esforco;
        else if (type === 'status') cur = task.checked ? 'done' : task.inProgress ? 'doing' : 'todo';
        else cur = task.modo;
        if (opt.value && cur === opt.value) btn.classList.add('selected');
        btn.addEventListener('click', (e) => {
          e.stopPropagation();
          if (type === 'moscow')       setTaskMoscow(task.id, opt.value);
          else if (type === 'esforco') setTaskEsforco(task.id, opt.value);
          else if (type === 'status')  setTaskStatus(task.id, opt.value);
          else                         setTaskModo(task.id, opt.value);
          popup.remove();
        });
        popup.appendChild(btn);
      });

      document.body.appendChild(popup);
      const rect = anchorEl.getBoundingClientRect();
      // Posicionar abaixo do badge, ajustar se sair da tela
      let top = rect.bottom + 5;
      let left = rect.left;
      popup.style.visibility = 'hidden';
      popup.style.top = top + 'px';
      popup.style.left = left + 'px';
      requestAnimationFrame(() => {
        const pw = popup.offsetWidth;
        const ph = popup.offsetHeight;
        if (left + pw > window.innerWidth - 8) left = window.innerWidth - pw - 8;
        if (top + ph > window.innerHeight - 8) top = rect.top - ph - 5;
        popup.style.top = top + 'px';
        popup.style.left = left + 'px';
        popup.style.visibility = '';
      });

      const closeOnOutside = (e) => {
        if (!popup.contains(e.target)) {
          popup.remove();
          document.removeEventListener('click', closeOnOutside, true);
        }
      };

    // Picker de seção (projeto) — usado na aba Prioridade
    function showSectionPicker(anchorEl, task) {
      document.querySelectorAll('.tag-picker-popup').forEach(el => el.remove());

      // task.section é definido no parse e aponta para o sec.id actual
      const currentSectionId = task.section || null;

      const popup = document.createElement('div');
      popup.className = 'tag-picker-popup';

      // Cabeçalho
      const header = document.createElement('div');
      header.style.cssText = 'font-size:10px;font-weight:600;color:var(--text-muted);text-transform:uppercase;letter-spacing:.5px;padding:4px 8px 6px;border-bottom:1px solid var(--border);margin-bottom:4px;';
      header.textContent = 'Mover para projeto';
      popup.appendChild(header);

      sections.forEach(sec => {
        const cleanName = sec.name
          .replace(/[\u{1F300}-\u{1FAFF}]|[☀-⟿]/gu, '')
          .replace(/\s*\[(Must|Should|Could|Won.?t)\]/gi, '')
          .trim();
        const btn = document.createElement('button');
        btn.className = 'tag-picker-opt';
        btn.style.cssText = 'text-align:left;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;max-width:220px;';
        btn.textContent = cleanName;
        btn.title = sec.name;
        if (sec.id === currentSectionId) btn.classList.add('selected');

        // mousedown dispara antes do closeOnOutside (click capture), evitando race condition
        btn.addEventListener('mousedown', (e) => {
          e.preventDefault(); // impede que o click subsequente feche o popup
          e.stopPropagation();
          if (sec.id !== currentSectionId) {
            // Remove da seção original
            const fromArr = tasks[currentSectionId] || [];
            const idx = fromArr.indexOf(task);
            if (idx !== -1) fromArr.splice(idx, 1);
            // Insere na nova seção
            task.section = sec.id;
            if (!tasks[sec.id]) tasks[sec.id] = [];
            tasks[sec.id].push(task);
            markChanged();
          }
          popup.remove();
          renderTasks();
        });
        popup.appendChild(btn);
      });

      document.body.appendChild(popup);
      const rect = anchorEl.getBoundingClientRect();
      let top  = rect.bottom + 5;
      let left = rect.left;
      popup.style.visibility = 'hidden';
      popup.style.top  = top  + 'px';
      popup.style.left = left + 'px';
      requestAnimationFrame(() => {
        const pw = popup.offsetWidth;
        const ph = popup.offsetHeight;
        if (left + pw > window.innerWidth  - 8) left = window.innerWidth  - pw - 8;
        if (top  + ph > window.innerHeight - 8) top  = rect.top - ph - 5;
        popup.style.top  = top  + 'px';
        popup.style.left = left + 'px';
        popup.style.visibility = '';
      });

      const closeOnOutside = (e) => {
        if (!popup.isConnected) { document.removeEventListener('click', closeOnOutside, true); return; }
        if (!popup.contains(e.target)) {
          popup.remove();
          document.removeEventListener('click', closeOnOutside, true);
        }
      };
      setTimeout(() => document.addEventListener('click', closeOnOutside, true), 0);
    }

    // ===== SCORE ENGINE =====
    function calcDeadlinePoints(deadlineStr) {
      if (!deadlineStr) return 0;
      const today = new Date(); today.setHours(0,0,0,0);
      const due   = new Date(deadlineStr); due.setHours(0,0,0,0);
      const diffDays = Math.round((due - today) / 86400000);
      if (diffDays < 0)  return 5 + Math.abs(diffDays); // atrasada
      if (diffDays === 0) return 4;                      // hoje
      if (diffDays === 1) return 3;                      // amanhã
      if (diffDays <= 7)  return 2;                      // essa semana
      return 1;                                          // tem prazo (futuro)
    }

    function calcScore(task, section) {
      // Bloqueada → 0
      const dep = depMap[task.id] || { blockedByIds: [], unlocksIds: [] };
      const activeBlockers = dep.blockedByIds.filter(id => taskFlatMap[id] && !taskFlatMap[id].checked);
      if (activeBlockers.length > 0) return 0;

      const mPts = { must: 3, should: 2, could: 1, wont: 0, '': 1 };
      const taskM = task.moscow || '';
      const catM  = section ? (section.moscow || '') : '';

      // Won't → 0
      if (taskM === 'wont') return 0;

      const base = (mPts[catM] ?? 1) * (mPts[taskM] ?? 1);

      // Bônus de deps: soma dos scores potenciais das tarefas que esta desbloqueia
      // (usa potentialScoreMap para evitar o problema de bloqueadas terem score=0)
      const depBonus = (dep.unlocksIds || []).reduce((sum, id) => sum + (potentialScoreMap[id] || 0), 0);

      const deadlineBonus = calcDeadlinePoints(task.deadline);

      // Bônus de em andamento: +1 ponto
      const inProgressBonus = task.inProgress ? 1 : 0;

      // Age bonus: log2(dias+1)
      let ageBonus = 0;
      if (task.addedDate) {
        const added = new Date(task.addedDate); added.setHours(0,0,0,0);
        const now   = new Date();               now.setHours(0,0,0,0);
        const dias  = Math.max(0, Math.round((now - added) / 86400000));
        ageBonus = Math.log2(dias + 1);
      }

      const effortDiv = { rapido: 1, medio: 2, longo: 3, '': 1 };
      const effort = effortDiv[task.esforco || ''] ?? 1;

      return (base + depBonus + inProgressBonus + deadlineBonus + ageBonus) / effort;
    }

      const sectionMap = Object.fromEntries(activeSecs.map(s => [s.id, s]));
      let scored = [];
      activeSecs.forEach(section => {
        (tasks[section.id] || []).forEach(task => {
          if (task.checked) return; // ignora concluídas
          // Aplica filtro de modo
          if (prioridadeModoFilter === 'manuais' && task.modo !== 'manual') return;
          if (prioridadeModoFilter === 'ia' && !['delegar','colaborar','automatizar'].includes(task.modo)) return;
          const score = calcScore(task, section);
          scored.push({ task, section, score });
        });
      });

      // Ordena: maior score primeiro; bloqueadas por último; empates por título
      scored.sort((a, b) => {
        const aBlk = isTaskBlocked(a.task) ? 1 : 0;
        const bBlk = isTaskBlocked(b.task) ? 1 : 0;
        if (aBlk !== bBlk) return aBlk - bBlk;
        return b.score - a.score || a.task.title.localeCompare(b.task.title);

        // ── Bloqueio ──

        // ── Meta (badges + seção) ──
