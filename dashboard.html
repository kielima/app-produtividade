<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Productivity</title>
  <link rel="icon" type="image/svg+xml" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 32 32'%3E%3Crect x='4' y='2' width='24' height='28' rx='4' fill='%23faf9f5' stroke='%23D97757' stroke-width='2'/%3E%3Crect x='8' y='0' width='16' height='5' rx='2.5' fill='%23D97757'/%3E%3Cpath d='M9 13l3 3 5-5' fill='none' stroke='%23D97757' stroke-width='2.5' stroke-linecap='round' stroke-linejoin='round'/%3E%3Crect x='20' y='12' width='5' height='2' rx='1' fill='%23c4c4c2'/%3E%3Crect x='9' y='20' width='10' height='2' rx='1' fill='%23c4c4c2'/%3E%3Crect x='9' y='25' width='7' height='2' rx='1' fill='%23c4c4c2'/%3E%3C/svg%3E">
  <style>
    @font-face {
      font-family: 'Inter';
      src: url('./Inter.woff2') format('woff2');
      font-weight: 100 900;
      font-display: swap;
    }
  </style>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg-primary: #faf9f5;
      --bg-secondary: #F5F4EF;
      --bg-card: #ffffff;
      --text-primary: #141413;
      --text-secondary: #5c5c5a;
      --text-muted: #8c8c8a;
      --accent: #D97757;
      --accent-hover: #c4684a;
      --border: #e5e4df;
      --border-light: #eeeee9;
      --shadow: rgba(20, 20, 19, 0.04);
      --shadow-hover: rgba(20, 20, 19, 0.08);
    }

    body {
      font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
      background: var(--bg-primary);
      color: var(--text-primary);
      height: 100vh;
      padding: 20px 24px;
      line-height: 1.5;
      overflow: hidden;
      display: flex;
      flex-direction: column;
    }

    header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 16px;
      padding-bottom: 16px;
      border-bottom: 1px solid var(--border);
      flex-shrink: 0;
    }

    h1 {
      font-size: 1.5rem;
      font-weight: 600;
      letter-spacing: -0.02em;
    }

    h2 { font-size: 1.1rem; font-weight: 600; margin-bottom: 12px; color: var(--text-secondary); }

    .header-left {
      display: flex;
      align-items: flex-start;
      gap: 0;
    }

    .view-toggle {
      display: flex;
      gap: 4px;
      background: var(--bg-secondary);
      padding: 4px;
      border-radius: 8px;
      margin-left: 16px;
    }

    .view-toggle button {
      background: transparent;
      border: none;
      padding: 6px 14px;
      font-size: 13px;
      color: var(--text-muted);
      border-radius: 6px;
    }

    .view-toggle button:hover {
      color: var(--text-primary);
      background: transparent;
    }

    .view-toggle button.active {
      background: var(--bg-card);
      color: var(--text-primary);
      box-shadow: 0 1px 3px var(--shadow);
    }

    .buttons { display: flex; gap: 12px; }

    button {
      background: var(--bg-card);
      color: var(--text-primary);
      border: 1px solid var(--border);
      padding: 10px 18px;
      border-radius: 8px;
      cursor: pointer;
      font-size: 14px;
      font-weight: 500;
      font-family: inherit;
      transition: all 0.15s ease;
    }

    button:hover {
      background: var(--bg-secondary);
      border-color: var(--text-muted);
    }

    button.primary {
      background: var(--accent);
      color: white;
      border-color: var(--accent);
    }

    button.primary:hover {
      background: var(--accent-hover);
      border-color: var(--accent-hover);
    }

    button:disabled {
      opacity: 0.4;
      cursor: not-allowed;
    }

    /* ===== TASKS STYLES ===== */

    .board {
      display: flex;
      gap: 24px;
      overflow-x: auto;
      overflow-y: hidden;
      padding-bottom: 24px;
      flex: 1;
      min-height: 0;
    }

    .column {
      background: var(--bg-secondary);
      border-radius: 12px;
      min-width: 340px;
      max-width: 340px;
      display: flex;
      flex-direction: column;
      height: 100%;
      max-height: 100%;
    }

    .column-header {
      padding: 16px 18px;
      font-weight: 600;
      font-size: 13px;
      text-transform: uppercase;
      letter-spacing: 0.05em;
      color: var(--text-secondary);
      display: flex;
      justify-content: space-between;
      align-items: center;
      cursor: grab;
    }

    .column-header:active {
      cursor: grabbing;
    }

    .column.dragging-column {
      opacity: 0.5;
    }

    .column-drop-indicator {
      width: 3px;
      background: var(--accent);
      border-radius: 2px;
      margin: 0 -2px;
      min-height: 100px;
    }

    .column-header .count {
      background: var(--bg-card);
      padding: 3px 10px;
      border-radius: 12px;
      font-size: 12px;
      font-weight: 500;
      color: var(--text-muted);
    }

    .cards {
      flex: 1;
      overflow-y: auto;
      padding: 0 12px 12px;
      min-height: 100px;
    }

    .cards.drag-over {
      background: rgba(217, 119, 87, 0.05);
      border-radius: 8px;
    }

    .task-card {
      background: var(--bg-card);
      border: 1px solid var(--border-light);
      border-radius: 10px;
      padding: 14px 16px;
      margin-bottom: 10px;
      cursor: grab;
      transition: all 0.15s ease;
      box-shadow: 0 1px 3px var(--shadow);
      position: relative;
    }

    .task-card:hover {
      box-shadow: 0 4px 12px var(--shadow-hover);
      border-color: var(--border);
    }

    .task-card .add-on-hover {
      opacity: 0;
      pointer-events: none;
      transition: opacity .15s;
    }

    .task-card:hover .add-on-hover {
      opacity: 1;
      pointer-events: auto;
    }

    .task-card .delete-btn {
      display: none;
      position: absolute;
      top: 8px;
      right: 8px;
      background: transparent;
      border: none;
      color: var(--text-muted);
      cursor: pointer;
      padding: 4px 6px;
      font-size: 14px;
      line-height: 1;
      border-radius: 4px;
    }

    .task-card:hover .delete-btn {
      display: block;
    }

    .task-card .delete-btn:hover {
      background: var(--bg-secondary);
      color: var(--accent);
    }

    .task-card.dragging {
      opacity: 0.5;
      transform: rotate(2deg);
    }

    .card-title {
      font-size: 14px;
      font-weight: 500;
      line-height: 1.5;
      color: var(--text-primary);
    }

    .card-note {
      font-size: 13px;
      color: var(--text-muted);
      margin-top: 6px;
      line-height: 1.4;
      overflow-wrap: break-word;
      word-break: break-word;
    }

    .card-subtasks {
      margin-top: 10px;
      padding-top: 10px;
      border-top: 1px solid var(--border-light);
      font-size: 13px;
      color: var(--text-secondary);
    }

    .subtask {
      padding: 3px 0;
      display: flex;
      align-items: flex-start;
      gap: 8px;
    }

    .checkbox {
      width: 18px;
      height: 18px;
      min-width: 18px;
      min-height: 18px;
      flex-shrink: 0;
      border: 2px solid var(--border);
      border-radius: 5px;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      vertical-align: middle;
      cursor: pointer;
      transition: all 0.15s ease;
      background: var(--bg-card);
    }

    .checkbox:hover {
      border-color: var(--accent);
    }

    .checkbox.checked {
      background: var(--accent);
      border-color: var(--accent);
    }

    .checkbox.checked::after {
      content: '';
      width: 5px;
      height: 9px;
      border: solid white;
      border-width: 0 2px 2px 0;
      transform: rotate(45deg);
      margin-bottom: 2px;
    }

    .empty-state {
      text-align: center;
      padding: 80px 40px;
      color: var(--text-muted);
    }

    .empty-state button {
      font-size: 16px;
      padding: 14px 28px;
      background: var(--accent);
      border: none;
      color: white;
    }

    .empty-state button:hover {
      background: var(--accent-hover);
    }

    .status-bar {
      position: fixed;
      bottom: 24px;
      left: 50%;
      transform: translateX(-50%);
      background: var(--text-primary);
      color: var(--bg-primary);
      padding: 12px 24px;
      border-radius: 10px;
      font-size: 13px;
      font-weight: 500;
      opacity: 0;
      transition: opacity 0.2s ease;
      box-shadow: 0 4px 20px rgba(20, 20, 19, 0.15);
      z-index: 200;
    }

    .status-bar.visible { opacity: 1; }

    .add-card {
      padding: 12px;
    }

    .add-card button {
      width: 100%;
      background: transparent;
      border: 2px dashed var(--border);
      color: var(--text-muted);
      font-weight: 500;
    }

    .add-card button:hover {
      border-color: var(--accent);
      color: var(--accent);
      background: transparent;
    }

    .new-task-input {
      width: 100%;
      background: var(--bg-card);
      border: 2px solid var(--accent);
      border-radius: 8px;
      padding: 12px;
      color: var(--text-primary);
      font-size: 14px;
      font-family: inherit;
      resize: none;
    }

    .new-task-input:focus {
      outline: none;
    }

    .new-task-input::placeholder {
      color: var(--text-muted);
    }

    /* Scrollbar styling */
    .cards::-webkit-scrollbar,
    .list-view::-webkit-scrollbar {
      width: 6px;
    }

    .cards::-webkit-scrollbar-track,
    .list-view::-webkit-scrollbar-track {
      background: transparent;
    }

    .cards::-webkit-scrollbar-thumb,
    .list-view::-webkit-scrollbar-thumb {
      background: var(--border);
      border-radius: 3px;
    }

    .cards::-webkit-scrollbar-thumb:hover,
    .list-view::-webkit-scrollbar-thumb:hover {
      background: var(--text-muted);
    }

    /* List View Styles */
    .list-view {
      max-width: 800px;
      margin: 0 auto;
      flex: 1;
      overflow-y: auto;
      overflow-x: hidden;
      min-height: 0;
    }

    .list-section {
      margin-bottom: 28px;
    }

    .list-section.drag-over {
      background: rgba(217, 119, 87, 0.05);
      border-radius: 8px;
      margin: 0 -12px 32px;
      padding: 0 12px;
    }

    .list-section-header {
      font-size: 13px;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.05em;
      color: var(--text-secondary);
      padding: 4px 0;
      margin-bottom: 6px;
      display: flex;
      justify-content: space-between;
      align-items: center;
    }

    .list-section-header .section-title {
      cursor: pointer;
    }

    .list-section-header .section-title:hover {
      color: var(--text-primary);
    }

    .list-section-header .count {
      font-size: 12px;
      color: var(--text-muted);
      font-weight: 500;
    }

    .list-item {
      display: flex;
      align-items: flex-start;
      gap: 12px;
      padding: 12px 14px;
      margin-bottom: 6px;
      background: var(--bg-card);
      border: 1px solid var(--border-light);
      cursor: grab;
      position: relative;
      border-radius: 10px;
      transition: all 0.15s ease;
      box-shadow: 0 1px 3px var(--shadow);
    }

    .list-item:active {
      cursor: grabbing;
    }

    .list-item:hover {
      box-shadow: 0 4px 12px var(--shadow-hover);
      border-color: var(--border);
    }

    .list-item.dragging {
      opacity: 0.5;
      background: var(--bg-secondary);
    }

    .list-item .checkbox {
      margin-top: 2px;
      flex-shrink: 0;
    }

    .list-item-content {
      flex: 1;
      min-width: 0;
    }

    .list-item-title {
      font-size: 15px;
      color: var(--text-primary);
      line-height: 1.4;
    }

    .list-item-title.checked {
      color: var(--text-muted);
      text-decoration: line-through;
    }

    .list-item-note {
      font-size: 13px;
      color: var(--text-muted);
      margin-top: 4px;
      cursor: pointer;
    }

    .list-item-note:hover {
      color: var(--text-secondary);
    }

    .list-item-note.add-note {
      font-style: italic;
      display: none;
    }

    .list-item:hover .list-item-note.add-note {
      display: block;
    }

    .list-item-subtasks {
      margin-top: 8px;
      padding-left: 2px;
    }

    .list-item-subtask {
      display: flex;
      align-items: flex-start;
      gap: 8px;
      padding: 3px 0;
      font-size: 13px;
      color: var(--text-secondary);
    }

    .list-item-subtask .checkbox {
      width: 16px;
      height: 16px;
      min-width: 16px;
      min-height: 16px;
      margin-top: 1px;
    }

    .list-item-subtask span {
      cursor: pointer;
    }

    .list-item-subtask span:hover {
      color: var(--text-primary);
    }

    .list-item-add-subtask {
      font-size: 13px;
      color: var(--text-muted);
      font-style: italic;
      cursor: pointer;
      padding: 3px 0;
      padding-left: 24px;
      display: none;
    }

    .list-item:hover .list-item-add-subtask {
      display: block;
    }

    .list-item-add-subtask:hover {
      color: var(--accent);
    }

    .list-item-section {
      font-size: 11px;
      color: var(--text-muted);
      background: var(--bg-secondary);
      padding: 2px 8px;
      border-radius: 4px;
      white-space: nowrap;
    }

    .list-item-actions {
      display: none;
      position: absolute;
      top: 8px;
      right: 8px;
    }

    .list-item:hover .list-item-actions {
      display: flex;
      gap: 4px;
    }

    .list-item-actions button {
      background: transparent;
      border: none;
      color: var(--text-muted);
      cursor: pointer;
      padding: 4px 6px;
      font-size: 14px;
      line-height: 1;
      border-radius: 4px;
    }

    .list-item-actions button:hover {
      background: var(--bg-card);
      color: var(--accent);
    }

    .list-drop-indicator {
      height: 3px;
      background: var(--accent);
      border-radius: 2px;
      margin: 2px -12px;
    }

    .list-add-section {
      margin-top: 16px;
      padding: 16px;
      border: 2px dashed var(--border);
      border-radius: 8px;
      text-align: center;
      cursor: pointer;
      color: var(--text-muted);
      font-size: 14px;
      font-weight: 500;
      transition: all 0.15s ease;
    }

    .list-add-section:hover {
      border-color: var(--accent);
      color: var(--accent);
    }

    .quick-add {
      display: flex;
      align-items: center;
      gap: 12px;
      padding: 12px 0;
    }

    .quick-add-input {
      flex: 1;
      background: transparent;
      border: none;
      font-size: 15px;
      color: var(--text-primary);
      font-family: inherit;
      outline: none;
    }

    .quick-add-input::placeholder {
      color: var(--text-muted);
    }

    .quick-add-section {
      font-size: 12px;
      color: var(--text-muted);
      background: var(--bg-secondary);
      padding: 4px 10px;
      border-radius: 6px;
      cursor: pointer;
      border: 1px solid var(--border);
    }

    .quick-add-section:hover {
      border-color: var(--accent);
    }

    .section-picker {
      position: absolute;
      background: var(--bg-card);
      border: 1px solid var(--border);
      border-radius: 8px;
      box-shadow: 0 4px 20px var(--shadow-hover);
      padding: 4px;
      z-index: 100;
    }

    .section-picker button {
      display: block;
      width: 100%;
      text-align: left;
      padding: 8px 12px;
      font-size: 13px;
      background: transparent;
      border: none;
      border-radius: 6px;
    }

    .section-picker button:hover {
      background: var(--bg-secondary);
    }

    /* ===== MEMORY STYLES ===== */

    .memory-tabs {
      display: flex;
      gap: 4px;
      margin-bottom: 12px;
      flex-wrap: wrap;
      background: var(--bg-secondary);
      padding: 4px;
      border-radius: 8px;
      flex-shrink: 0;
    }

    .memory-tab {
      background: transparent;
      color: var(--text-muted);
      padding: 8px 16px;
      border: none;
      border-radius: 6px;
      cursor: pointer;
      font-size: 13px;
      font-weight: 500;
      transition: all 0.15s ease;
      text-transform: capitalize;
    }

    .memory-tab:hover { color: var(--text-primary); }

    .memory-tab.active {
      color: var(--text-primary);
      background: var(--bg-card);
      box-shadow: 0 1px 3px var(--shadow);
    }

    .memory-tab .count {
      background: var(--bg-secondary);
      padding: 2px 8px;
      border-radius: 10px;
      font-size: 11px;
      margin-left: 6px;
      color: var(--text-muted);
    }

    .memory-tab.active .count {
      background: var(--border-light);
    }

    .memory-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
      gap: 16px;
    }

    .memory-flat-table {
      width: 100%;
      border-collapse: collapse;
      font-size: 13px;
    }

    .memory-flat-table th {
      text-align: left;
      padding: 10px 16px;
      font-weight: 500;
      color: var(--text-muted);
      border-bottom: 1px solid var(--border);
      font-size: 12px;
      text-transform: uppercase;
      letter-spacing: 0.03em;
    }

    .memory-flat-table td {
      padding: 9px 16px;
      border-bottom: 1px solid var(--border-light);
      color: var(--text-primary);
      line-height: 1.4;
    }

    .memory-flat-table td:first-child {
      color: var(--text-muted);
      font-weight: 500;
      white-space: nowrap;
      width: 120px;
    }

    .memory-flat-table tr:last-child td {
      border-bottom: none;
    }

    .memory-flat-table tr:hover td {
      background: var(--bg-secondary);
    }

    .memory-card {
      background: var(--bg-card);
      border: 1px solid var(--border-light);
      border-radius: 10px;
      padding: 16px;
      cursor: pointer;
      transition: all 0.15s ease;
      box-shadow: 0 1px 3px var(--shadow);
    }

    .memory-card:hover {
      border-color: var(--accent);
      box-shadow: 0 4px 12px var(--shadow-hover);
    }

    .memory-card-title {
      font-size: 15px;
      font-weight: 600;
      margin-bottom: 8px;
      display: flex;
      align-items: center;
      gap: 8px;
      color: var(--text-primary);
    }

    .memory-card-meta {
      font-size: 13px;
      color: var(--text-muted);
      margin-bottom: 8px;
    }

    .memory-card-preview {
      font-size: 13px;
      color: var(--text-secondary);
      line-height: 1.5;
      overflow: hidden;
      display: -webkit-box;
      -webkit-line-clamp: 4;
      -webkit-box-orient: vertical;
    }

    .memory-card-fields {
      margin-top: 10px;
      font-size: 12px;
    }

    .memory-card-field {
      display: flex;
      gap: 8px;
      margin-bottom: 4px;
    }

    .memory-card-field-label {
      color: var(--text-muted);
      min-width: 80px;
    }

    .memory-card-field-value {
      color: var(--text-secondary);
    }

    .file-card {
      background: var(--bg-card);
      border: 1px solid var(--border-light);
      border-radius: 10px;
      margin-bottom: 16px;
      box-shadow: 0 1px 3px var(--shadow);
    }

    .file-card-header {
      padding: 16px;
      border-bottom: 1px solid var(--border-light);
      display: flex;
      justify-content: space-between;
      align-items: center;
      cursor: pointer;
    }

    .file-card-header:hover {
      background: var(--bg-secondary);
    }

    .file-card-title {
      font-size: 14px;
      font-weight: 600;
      color: var(--text-primary);
    }

    .file-card-content {
      padding: 16px;
      font-size: 13px;
      line-height: 1.6;
      white-space: pre-wrap;
      font-family: ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, monospace;
      overflow-y: auto;
      display: none;
      color: var(--text-secondary);
    }

    .file-card-content.expanded {
      display: block;
    }

    .stats {
      display: flex;
      gap: 16px;
      margin-bottom: 24px;
      flex-wrap: wrap;
    }

    .stat {
      background: var(--bg-card);
      border: 1px solid var(--border-light);
      border-radius: 10px;
      padding: 16px 24px;
      min-width: 100px;
      box-shadow: 0 1px 3px var(--shadow);
    }

    .stat-value {
      font-size: 28px;
      font-weight: 600;
      color: var(--accent);
    }

    .stat-label {
      font-size: 12px;
      color: var(--text-muted);
      text-transform: capitalize;
      margin-top: 4px;
    }

    .search-box {
      background: var(--bg-card);
      border: 1px solid var(--border);
      border-radius: 8px;
      padding: 10px 16px;
      display: flex;
      align-items: center;
      gap: 10px;
      margin-bottom: 20px;
    }

    .search-box input {
      flex: 1;
      background: transparent;
      border: none;
      color: var(--text-primary);
      font-size: 14px;
      font-family: inherit;
      outline: none;
    }

    .search-box input::placeholder {
      color: var(--text-muted);
    }

    .add-btn {
      background: transparent;
      border: 2px dashed var(--border);
      color: var(--text-muted);
      padding: 40px;
      border-radius: 10px;
      cursor: pointer;
      transition: all 0.15s ease;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 14px;
      font-weight: 500;
    }

    .add-btn:hover {
      border-color: var(--accent);
      color: var(--accent);
    }

    .markdown-content {
      line-height: 1.6;
      color: var(--text-secondary);
    }

    .markdown-content h1 { font-size: 1.4em; margin: 16px 0 8px; color: var(--text-primary); }
    .markdown-content h2 { font-size: 1.2em; margin: 14px 0 6px; color: var(--text-primary); }
    .markdown-content h3 { font-size: 1.1em; margin: 12px 0 4px; color: var(--text-secondary); }
    .markdown-content p { margin: 8px 0; }
    .markdown-content ul, .markdown-content ol { margin: 8px 0 8px 20px; }
    .markdown-content li { margin: 4px 0; }
    .markdown-content code {
      background: var(--bg-secondary);
      padding: 2px 6px;
      border-radius: 4px;
      font-family: ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, monospace;
      color: var(--text-primary);
    }
    .markdown-content pre {
      background: var(--bg-secondary);
      padding: 12px;
      border-radius: 8px;
      overflow-x: auto;
      margin: 8px 0;
      border: 1px solid var(--border-light);
    }
    .markdown-content table {
      width: 100%;
      border-collapse: collapse;
      margin: 8px 0;
      font-size: 13px;
    }
    .markdown-content th, .markdown-content td {
      padding: 12px 16px;
      text-align: left;
      border-bottom: 1px solid var(--border-light);
    }
    .markdown-content th {
      background: var(--bg-secondary);
      font-weight: 600;
      font-size: 12px;
      text-transform: uppercase;
      letter-spacing: 0.05em;
      color: var(--text-secondary);
    }

    /* Modal */
    .modal-overlay {
      display: none;
      position: fixed;
      top: 0;
      left: 0;
      right: 0;
      bottom: 0;
      background: rgba(20, 20, 19, 0.5);
      z-index: 100;
      align-items: center;
      justify-content: center;
    }

    .modal-overlay.visible {
      display: flex;
    }

    .modal {
      background: var(--bg-card);
      border-radius: 12px;
      width: 90%;
      max-width: 800px;
      max-height: 85vh;
      overflow: hidden;
      display: flex;
      flex-direction: column;
      box-shadow: 0 20px 60px rgba(20, 20, 19, 0.2);
    }

    .modal-header {
      padding: 20px;
      border-bottom: 1px solid var(--border);
      display: flex;
      justify-content: space-between;
      align-items: center;
    }

    .modal-header h3 {
      font-size: 18px;
      font-weight: 600;
      color: var(--text-primary);
    }

    .modal-close {
      background: transparent;
      border: none;
      color: var(--text-muted);
      font-size: 24px;
      cursor: pointer;
      padding: 0;
      line-height: 1;
    }

    .modal-close:hover { color: var(--text-primary); }

    .modal-body {
      padding: 20px;
      overflow-y: auto;
      flex: 1;
    }

    .modal-footer {
      padding: 16px 20px;
      border-top: 1px solid var(--border);
      display: flex;
      justify-content: flex-end;
      gap: 10px;
    }

    .form-group {
      margin-bottom: 16px;
    }

    .form-group label {
      display: block;
      font-size: 12px;
      font-weight: 600;
      color: var(--text-secondary);
      text-transform: uppercase;
      letter-spacing: 0.05em;
      margin-bottom: 6px;
    }

    .form-group textarea {
      width: 100%;
      background: var(--bg-secondary);
      border: 1px solid var(--border);
      border-radius: 8px;
      padding: 12px;
      color: var(--text-primary);
      font-size: 13px;
      font-family: ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, monospace;
      line-height: 1.5;
      min-height: 300px;
      resize: vertical;
    }

    .form-group textarea:focus {
      outline: none;
      border-color: var(--accent);
    }

    /* Tab panel containers */
    .tab-panel {
      display: none;
      flex: 1;
      min-height: 0;
      flex-direction: column;
    }

    .tab-panel.active {
      display: flex;
    }

    /* Memory panel scrollable area */
    .memory-content-area {
      flex: 1;
      overflow-y: auto;
      min-height: 0;
    }

    .memory-content-area::-webkit-scrollbar {
      width: 6px;
    }

    .memory-content-area::-webkit-scrollbar-track {
      background: transparent;
    }

    .memory-content-area::-webkit-scrollbar-thumb {
      background: var(--border);
      border-radius: 3px;
    }

    .memory-content-area::-webkit-scrollbar-thumb:hover {
      background: var(--text-muted);
    }

    .file-card-content::-webkit-scrollbar,
    .modal-body::-webkit-scrollbar {
      width: 6px;
    }

    .file-card-content::-webkit-scrollbar-track,
    .modal-body::-webkit-scrollbar-track {
      background: transparent;
    }

    .file-card-content::-webkit-scrollbar-thumb,
    .modal-body::-webkit-scrollbar-thumb {
      background: var(--border);
      border-radius: 3px;
    }

    .file-card-content::-webkit-scrollbar-thumb:hover,
    .modal-body::-webkit-scrollbar-thumb:hover {
      background: var(--text-muted);
    }

    /* File path display */
    .file-path {
      font-size: 13px;
      color: var(--text-muted);
      margin-top: 2px;
    }

    /* ===== KANBAN STATUS COLUMNS ===== */
    .kanban-col-todo  { --col-accent: #6b7280; }
    .kanban-col-doing { --col-accent: #f59e0b; }
    .kanban-col-done  { --col-accent: #10b981; }

    .kanban-col-todo  .column-header,
    .kanban-col-doing .column-header,
    .kanban-col-done  .column-header {
      border-top: 3px solid var(--col-accent);
      padding-top: 9px;
    }

    .kanban-col-todo  .count { background: #e5e7eb; color: #374151; }
    .kanban-col-doing .count { background: #fef3c7; color: #92400e; }
    .kanban-col-done  .count { background: #d1fae5; color: #065f46; }

    .card-category-tag {
      font-size: 11px;
      color: var(--text-muted);
      background: var(--bg-secondary);
      border: 1px solid var(--border-light);
      padding: 2px 8px;
      border-radius: 10px;
      display: inline-block;
      margin-top: 5px;
      margin-left: 30px;
      max-width: calc(100% - 38px);
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
    }

    /* ===== Modo de Execução badges ===== */
    .modo-badge {
      display: inline-flex;
      align-items: center;
      gap: 3px;
      font-size: 10px;
      font-weight: 600;
      letter-spacing: 0.03em;
      text-transform: uppercase;
      padding: 2px 7px;
      border-radius: 10px;
      margin-left: 30px;
      margin-top: 3px;
      width: fit-content;
    }
    .modo-delegar     { background: #ede9fe; color: #6d28d9; }
    .modo-colaborar   { background: #d1fae5; color: #065f46; }
    .modo-automatizar { background: #fef9c3; color: #854d0e; }
    .modo-manual      { background: #f3f4f6; color: #374151; }

    .kanban-col-delegar     .column-header { border-top: 3px solid #7c3aed; }
    .kanban-col-colaborar   .column-header { border-top: 3px solid #059669; }
    .kanban-col-automatizar .column-header { border-top: 3px solid #d97706; }
    .kanban-col-manual      .column-header { border-top: 3px solid #6b7280; }
    .kanban-col-modo-none   .column-header { border-top: 3px solid var(--border); }

    .kanban-col-delegar     .count { background: #ede9fe; color: #6d28d9; }
    .kanban-col-colaborar   .count { background: #d1fae5; color: #065f46; }
    .kanban-col-automatizar .count { background: #fef9c3; color: #854d0e; }
    .kanban-col-manual      .count { background: #f3f4f6; color: #374151; }
    .kanban-col-modo-none   .count { background: var(--bg-secondary); color: var(--text-muted); }

    /* ===== MoSCoW priority badges ===== */
    .moscow-badge {
      display: inline-flex;
      align-items: center;
      gap: 3px;
      font-size: 10px;
      font-weight: 600;
      letter-spacing: 0.03em;
      text-transform: uppercase;
      padding: 2px 7px;
      border-radius: 10px;
      margin-left: 30px;
      margin-top: 4px;
      width: fit-content;
    }
    .moscow-must   { background: #fee2e2; color: #b91c1c; }
    .moscow-should { background: #ffedd5; color: #c2410c; }
    .moscow-could  { background: #dbeafe; color: #1d4ed8; }
    .moscow-wont   { background: #f3f4f6; color: #4b5563; }

    /* ===== MoSCoW column colours ===== */
    .kanban-col-must   .column-header { border-top: 3px solid #ef4444; }
    .kanban-col-should .column-header { border-top: 3px solid #f97316; }
    .kanban-col-could  .column-header { border-top: 3px solid #3b82f6; }
    .kanban-col-wont   .column-header { border-top: 3px solid #9ca3af; }
    .kanban-col-none   .column-header { border-top: 3px solid var(--border); }

    .kanban-col-must   .count { background: #fee2e2; color: #b91c1c; }
    .kanban-col-should .count { background: #ffedd5; color: #c2410c; }
    .kanban-col-could  .count { background: #dbeafe; color: #1d4ed8; }
    .kanban-col-wont   .count { background: #f3f4f6; color: #4b5563; }
    .kanban-col-none   .count { background: var(--bg-secondary); color: var(--text-muted); }

    /* ===== Esforço column colours ===== */
    .kanban-col-rapido  .column-header { border-top: 3px solid #10b981; }
    .kanban-col-medio   .column-header { border-top: 3px solid #f59e0b; }
    .kanban-col-longo   .column-header { border-top: 3px solid #ef4444; }
    .kanban-col-esf-none .column-header { border-top: 3px solid var(--border); }

    .kanban-col-rapido  .count { background: #d1fae5; color: #065f46; }
    .kanban-col-medio   .count { background: #fef3c7; color: #92400e; }
    .kanban-col-longo   .count { background: #fee2e2; color: #b91c1c; }
    .kanban-col-esf-none .count { background: var(--bg-secondary); color: var(--text-muted); }

    /* ===== Esforço badges ===== */
    .esforco-badge {
      display: inline-flex;
      align-items: center;
      gap: 3px;
      font-size: 10px;
      font-weight: 600;
      letter-spacing: 0.03em;
      text-transform: uppercase;
      padding: 2px 7px;
      border-radius: 10px;
      margin-left: 4px;
      margin-top: 4px;
      width: fit-content;
    }
    .esforco-rapido { background: #d1fae5; color: #065f46; }
    .esforco-medio  { background: #fef3c7; color: #92400e; }
    .esforco-longo  { background: #fee2e2; color: #b91c1c; }

    /* ===== Project filter bar ===== */
    #projectFilterBar {
      display: none;
      padding: 6px 16px;
      gap: 6px;
      flex-wrap: wrap;
      align-items: center;
      border-bottom: 1px solid var(--border);
      flex-shrink: 0;
      background: var(--bg-secondary);
    }
    .proj-filter-label {
      font-size: 11px;
      font-weight: 600;
      color: var(--text-muted);
      margin-right: 2px;
      text-transform: uppercase;
      letter-spacing: 0.5px;
      flex-shrink: 0;
    }
    .proj-filter-btn {
      font-size: 12px;
      padding: 3px 10px;
      border-radius: 12px;
      border: 1px solid var(--border);
      background: var(--bg-card);
      color: var(--text-secondary);
      cursor: pointer;
      white-space: nowrap;
      transition: all 0.15s;
    }
    .proj-filter-btn:hover { border-color: var(--accent); color: var(--accent); }
    .proj-filter-btn.active { background: var(--accent); color: #fff; border-color: var(--accent); }

    /* ===== Mode filter bar (Prioridade view) ===== */
    .modo-filter-bar {
      display: flex;
      gap: 6px;
      margin-bottom: 12px;
      flex-wrap: wrap;
      align-items: center;
    }
    .modo-filter-label {
      font-size: 11px;
      font-weight: 600;
      color: var(--text-muted);
      text-transform: uppercase;
      letter-spacing: 0.5px;
      margin-right: 2px;
    }
    .modo-filter-btn {
      font-size: 12px;
      padding: 4px 14px;
      border-radius: 12px;
      border: 1px solid var(--border);
      background: var(--bg-card);
      color: var(--text-secondary);
      cursor: pointer;
      transition: all 0.15s;
    }
    .modo-filter-btn:hover { border-color: var(--accent); color: var(--accent); }
    .modo-filter-btn.active { background: var(--accent); color: #fff; border-color: var(--accent); }

    /* ===== Score badge ===== */
    .score-badge {
      display: inline-flex;
      align-items: center;
      gap: 3px;
      font-size: 10px;
      font-weight: 700;
      padding: 2px 8px;
      border-radius: 10px;
      margin-left: 4px;
      margin-top: 4px;
      background: #1e1b4b;
      color: #c7d2fe;
      width: fit-content;
      letter-spacing: 0.02em;
    }

    /* ===== Tag picker popup (MoSCoW / Modo) ===== */
    .tag-picker-popup {
      position: fixed;
      background: var(--bg-card);
      border: 1px solid var(--border);
      border-radius: 10px;
      box-shadow: 0 6px 24px rgba(20,20,19,0.14);
      padding: 5px;
      z-index: 600;
      min-width: 150px;
    }
    .tag-picker-opt {
      display: block;
      width: 100%;
      text-align: left;
      padding: 6px 11px;
      font-size: 11px;
      font-weight: 600;
      letter-spacing: 0.03em;
      text-transform: uppercase;
      border: 2px solid transparent;
      border-radius: 7px;
      cursor: pointer;
      background: transparent;
      margin-bottom: 2px;
      transition: filter 0.1s;
    }
    .tag-picker-opt:last-child { margin-bottom: 0; }
    .tag-picker-opt.selected { border-color: var(--accent); }
    .tag-picker-opt:hover { filter: brightness(0.93); }
    .tag-picker-opt.opt-must   { background:#fee2e2;color:#b91c1c; }
    .tag-picker-opt.opt-should { background:#ffedd5;color:#c2410c; }
    .tag-picker-opt.opt-could  { background:#dbeafe;color:#1d4ed8; }
    .tag-picker-opt.opt-wont   { background:#f3f4f6;color:#4b5563; }
    .tag-picker-opt.opt-delegar     { background:#ede9fe;color:#6d28d9; }
    .tag-picker-opt.opt-colaborar   { background:#d1fae5;color:#065f46; }
    .tag-picker-opt.opt-automatizar { background:#fef9c3;color:#854d0e; }
    .tag-picker-opt.opt-manual      { background:#f3f4f6;color:#374151; }
    .tag-picker-opt.opt-rapido      { background:#d1fae5;color:#065f46; }
    .tag-picker-opt.opt-medio       { background:#fef3c7;color:#92400e; }
    .tag-picker-opt.opt-longo       { background:#fee2e2;color:#b91c1c; }
    .tag-picker-opt.opt-remove      { background:transparent;color:var(--text-muted);border-color:var(--border-light); }
    .tag-picker-opt.opt-remove:hover { color:var(--accent); border-color:var(--accent); filter:none; }
    .tag-picker-opt.opt-status-todo  { background:#f3f4f6;color:#374151; }
    .tag-picker-opt.opt-status-doing { background:#fef3c7;color:#92400e; }
    .tag-picker-opt.opt-status-done  { background:#d1fae5;color:#065f46; }
    /* Badge de status Kanban */
    .status-badge {
      display: inline-flex; align-items: center;
      font-size: 10px; font-weight: 600; letter-spacing: 0.03em;
      text-transform: uppercase; padding: 2px 7px; border-radius: 10px;
      margin-left: 4px; margin-top: 4px; cursor: pointer;
    }
    .status-badge:hover { filter: brightness(0.92); }
    .status-badge-todo  { background:#f3f4f6;color:#374151; }
    .status-badge-doing { background:#fef3c7;color:#92400e; }
    .status-badge-done  { background:#d1fae5;color:#065f46; }
    /* Badges clicáveis */
    .moscow-badge[data-action], .modo-badge[data-action] { cursor: pointer; }
    .moscow-badge[data-action]:hover, .modo-badge[data-action]:hover { filter: brightness(0.92); }
    .badge-add {
      display: inline-flex; align-items: center;
      font-size: 10px; font-weight: 600; letter-spacing: 0.03em;
      text-transform: uppercase; padding: 2px 7px; border-radius: 10px;
      margin-top: 3px; width: fit-content; cursor: pointer;
      background: var(--bg-secondary); color: var(--text-muted);
      border: 1px dashed var(--border); transition: all 0.12s;
    }
    .badge-add:hover { border-color: var(--accent); color: var(--accent); }
    /* badges na lista */
    .list-item-badges { display: flex; flex-wrap: wrap; gap: 4px; margin-top: 5px; }

    /* ===== Prioridade view ===== */
    .prioridade-list {
      display: flex;
      flex-direction: column;
      gap: 6px;
      padding: 4px 0 20px;
      overflow-y: auto;
      flex: 1;
    }
    .prioridade-row {
      display: flex;
      align-items: center;
      gap: 10px;
      background: var(--bg-card);
      border: 1px solid var(--border);
      border-radius: 10px;
      padding: 10px 14px;
      position: relative;
    }
    .prioridade-row.checked-row {
      opacity: 0.5;
    }
    .prioridade-row.checked-row .prioridade-title {
      text-decoration: line-through;
      color: var(--text-muted);
    }
    .prioridade-actions {
      display: flex;
      gap: 2px;
      margin-left: auto;
      flex-shrink: 0;
      opacity: 0;
      pointer-events: none;
      transition: opacity 0.12s;
    }
    .prioridade-row:hover .prioridade-actions {
      opacity: 1;
      pointer-events: auto;
    }
    .prioridade-actions button {
      background: transparent;
      border: none;
      color: var(--text-muted);
      cursor: pointer;
      padding: 3px 6px;
      font-size: 13px;
      border-radius: 5px;
      line-height: 1;
    }
    .prioridade-actions button:hover {
      background: var(--bg-secondary);
      color: var(--accent);
    }
    .prioridade-rank {
      font-size: 12px;
      font-weight: 700;
      color: var(--text-muted);
      min-width: 24px;
      text-align: right;
    }
    .prioridade-score {
      font-size: 13px;
      font-weight: 700;
      min-width: 38px;
      text-align: center;
      background: #1e1b4b;
      color: #c7d2fe;
      border-radius: 8px;
      padding: 2px 7px;
    }
    .prioridade-score.score-zero {
      background: var(--bg-secondary);
      color: var(--text-muted);
    }
    .prioridade-title { flex: 1; font-size: 13px; color: var(--text-primary); }
    .prioridade-meta  { display: flex; gap: 6px; align-items: center; flex-wrap: wrap; }
    .prioridade-section { font-size: 11px; color: var(--text-muted); background: var(--bg-secondary); border-radius: 6px; padding: 2px 7px; transition: background 0.15s, color 0.15s; }
    .prioridade-section:hover { background: var(--accent); color: #fff; }

    /* ===== CALENDÁRIO VIEW ===== */
    #calendarView {
      flex: 1;
      min-height: 0;
      overflow: hidden;
      display: flex;      /* garante que herda flex corretamente do tab-panel */
    }

    .cal-layout {
      display: flex;
      gap: 16px;
      flex: 1;
      min-height: 0;
      width: 100%;
    }

    /* Coluna principal: nav + grid expandível + painel opcional */
    .cal-main {
      flex: 1;
      min-width: 0;
      display: flex;
      flex-direction: column;
      gap: 10px;
      overflow: hidden;   /* sem scroll próprio — o grid ocupa tudo */
    }

    .cal-sidebar {
      width: 320px;
      flex-shrink: 0;
      overflow-y: auto;
      background: var(--bg-secondary);
      border-radius: 12px;
      padding: 14px 12px;
      display: flex;
      flex-direction: column;
      gap: 0;
    }

    .cal-sidebar::-webkit-scrollbar { width: 6px; }
    .cal-sidebar::-webkit-scrollbar-track { background: transparent; }
    .cal-sidebar::-webkit-scrollbar-thumb { background: var(--border); border-radius: 3px; }

    /* Cards dentro da sidebar do calendário */
    .cal-sidebar .task-card {
      cursor: grab;
      margin-bottom: 8px;
    }
    .cal-sidebar .task-card:active { cursor: grabbing; }

    .cal-nav {
      display: flex;
      align-items: center;
      justify-content: space-between;
      flex-shrink: 0;
    }

    .cal-nav-title {
      font-weight: 600;
      font-size: 15px;
      color: var(--text-primary);
    }

    .cal-nav-right {
      display: flex;
      gap: 8px;
      align-items: center;
    }

    .cal-nav button {
      padding: 5px 13px;
      font-size: 13px;
      background: var(--bg-card);
      border: 1px solid var(--border);
      border-radius: 7px;
      cursor: pointer;
      font-family: inherit;
      color: var(--text-primary);
      transition: all .15s;
    }

    .cal-nav button:hover {
      border-color: var(--accent);
      color: var(--accent);
      background: var(--bg-card);
    }

    /* Grid: ocupa todo o espaço restante na coluna principal */
    .cal-grid {
      flex: 1;
      min-height: 0;
      display: grid;
      grid-template-columns: repeat(7, 1fr);
      /* grid-template-rows é definido via JS com base no nº de semanas */
      gap: 4px;
    }

    .cal-weekday {
      text-align: center;
      font-size: 11px;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.05em;
      color: var(--text-muted);
      padding: 4px 0;
      align-self: center;
    }

    /* Célula de dia: usa toda a altura da linha do grid */
    .cal-day {
      border-radius: 8px;
      border: 1px solid var(--border-light);
      background: var(--bg-card);
      padding: 6px 7px;
      cursor: pointer;
      transition: border-color 0.15s, box-shadow 0.15s, background 0.15s;
      position: relative;
      overflow: hidden;
      display: flex;
      flex-direction: column;
    }

    .cal-day:hover {
      border-color: var(--accent);
      box-shadow: 0 2px 8px var(--shadow-hover);
    }

    .cal-day.empty {
      background: transparent;
      border-color: transparent;
      cursor: default;
      pointer-events: none;
    }

    .cal-day.today {
      border-color: var(--accent);
      background: rgba(217, 119, 87, 0.05);
    }

    .cal-day.selected {
      background: var(--accent);
      border-color: var(--accent);
      box-shadow: 0 2px 8px rgba(217, 119, 87, 0.35);
    }

    .cal-day.selected .cal-day-num {
      color: white;
    }

    .cal-day.selected .cal-day-task-label {
      color: rgba(255,255,255,0.85);
    }

    .cal-day.has-overdue {
      border-left: 3px solid #ef4444;
    }

    /* Destaque ao arrastar tarefa sobre um dia */
    .cal-day.drop-target {
      border-color: var(--accent);
      background: rgba(217, 119, 87, 0.12);
      box-shadow: 0 0 0 2px rgba(217, 119, 87, 0.4);
    }

    .cal-day-num {
      font-size: 12px;
      font-weight: 600;
      color: var(--text-secondary);
      margin-bottom: 3px;
      line-height: 1;
      flex-shrink: 0;
    }

    .cal-day.today .cal-day-num {
      color: var(--accent);
    }

    .cal-day-tasks {
      display: flex;
      flex-direction: column;
      gap: 2px;
      flex: 1;
      overflow: hidden;
    }

    .cal-day-task-label {
      font-size: 10px;
      line-height: 1.3;
      color: var(--text-secondary);
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
    }

    .cal-day-more {
      font-size: 10px;
      color: var(--text-muted);
      flex-shrink: 0;
    }

    /* Painel do dia selecionado: aparece abaixo do grid, altura limitada */
    .cal-selected-panel {
      background: var(--bg-card);
      border: 1px solid var(--border);
      border-radius: 12px;
      padding: 14px 18px;
      flex-shrink: 0;
      max-height: 220px;
      overflow-y: auto;
    }

    .cal-selected-panel::-webkit-scrollbar { width: 5px; }
    .cal-selected-panel::-webkit-scrollbar-thumb { background: var(--border); border-radius: 3px; }

    .cal-selected-panel-title {
      font-size: 12px;
      font-weight: 600;
      color: var(--text-secondary);
      margin-bottom: 10px;
      text-transform: uppercase;
      letter-spacing: 0.04em;
    }

    .cal-selected-task {
      display: flex;
      align-items: stretch;
      gap: 10px;
      padding: 7px 0;
      border-bottom: 1px solid var(--border-light);
    }

    .cal-selected-task:last-child {
      border-bottom: none;
      padding-bottom: 0;
    }

    .cal-selected-task-bar {
      width: 3px;
      border-radius: 2px;
      flex-shrink: 0;
      min-height: 28px;
    }

    .cal-selected-task-title {
      font-size: 13px;
      font-weight: 500;
      color: var(--text-primary);
      line-height: 1.4;
    }

    .cal-selected-task-meta {
      font-size: 11px;
      color: var(--text-muted);
      margin-top: 2px;
    }

    /* Sidebar */
    .cal-sidebar-title {
      font-size: 12px;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.05em;
      color: var(--text-secondary);
      margin-bottom: 14px;
    }

    .cal-sidebar-group {
      margin-bottom: 14px;
    }

    .cal-sidebar-group-header {
      font-size: 11px;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.05em;
      padding: 3px 8px;
      border-radius: 6px;
      margin-bottom: 5px;
      display: flex;
      justify-content: space-between;
      align-items: center;
    }

    .cal-sidebar-item {
      font-size: 12px;
      color: var(--text-secondary);
      padding: 5px 6px;
      border-radius: 6px;
      line-height: 1.4;
      cursor: grab;
      transition: background .1s, opacity .1s;
      user-select: none;
    }

    .cal-sidebar-item:hover {
      background: var(--bg-primary);
      color: var(--text-primary);
    }

    .cal-sidebar-item.dragging-item {
      opacity: 0.4;
      cursor: grabbing;
    }

    .cal-empty-sidebar {
      font-size: 12px;
      color: var(--text-muted);
      text-align: center;
      padding: 24px 0;
    }

    .cal-drop-hint {
      font-size: 11px;
      color: var(--text-muted);
      text-align: center;
      padding: 8px 0 4px;
      border-top: 1px solid var(--border-light);
      margin-top: 8px;
    }

    /* ===== Dependências ===== */
    .dep-chip {
      display: inline-flex;
      align-items: center;
      gap: 3px;
      font-size: 11px;
      font-weight: 700;
      padding: 2px 7px;
      border-radius: 10px;
      cursor: pointer;
      border: none;
      font-family: inherit;
      margin-left: 4px;
      margin-top: 4px;
      transition: opacity .15s, transform .1s;
    }
    .dep-chip:hover { opacity: .8; transform: scale(1.07); }
    .dep-chip-blocked { background: #fee2e2; color: #b91c1c; }
    .dep-chip-key     { background: #d1fae5; color: #065f46; }

    .task-card.dep-blocked { opacity: .45; }
    .task-card.dep-blocked .card-title { color: var(--text-muted); }

    /* Modal de dependências */
    #depModalOverlay {
      position: fixed; inset: 0;
      background: rgba(0,0,0,.4);
      z-index: 1000;
      display: none;
      align-items: center;
      justify-content: center;
    }
    #depModalBox {
      background: var(--bg-card);
      border-radius: 12px;
      padding: 24px;
      min-width: 320px;
      max-width: 480px;
      max-height: 70vh;
      overflow-y: auto;
      box-shadow: 0 8px 32px rgba(0,0,0,.18);
    }
    #depModalTitle {
      font-size: 15px; font-weight: 600;
      margin-bottom: 16px; color: var(--text-primary);
    }
    .dep-tree-item {
      display: flex; align-items: flex-start; gap: 10px;
      padding: 8px 10px; border-radius: 8px;
      cursor: pointer; margin-bottom: 4px;
    }
    .dep-tree-item:hover { background: var(--bg-secondary); }
    .dep-tree-item-check {
      width: 16px; height: 16px; border-radius: 4px;
      border: 2px solid var(--border); flex-shrink: 0; margin-top: 2px;
    }
    .dep-tree-item-check.done {
      background: var(--accent); border-color: var(--accent);
    }

    /* Vista Dependências */
    .deps-view-wrap {
      display: flex; flex-direction: column; gap: 12px;
      overflow-y: auto; height: 100%; padding: 2px 4px;
    }
    .dep-chain {
      background: var(--bg-card); border: 1px solid var(--border);
      border-radius: 12px; padding: 16px;
    }
    .dep-chain-root {
      display: flex; align-items: center; gap: 10px;
      font-weight: 600; font-size: 14px; margin-bottom: 12px;
    }
    .dep-chain-dot {
      width: 20px; height: 20px; border-radius: 50%; flex-shrink: 0;
      display: flex; align-items: center; justify-content: center;
      font-size: 11px; color: white;
    }
    .dep-chain-children {
      padding-left: 20px;
      border-left: 2px solid var(--border-light);
      display: flex; flex-direction: column; gap: 4px;
    }

    /* Dep picker modal */
    #depPickerOverlay {
      position: fixed; inset: 0;
      background: rgba(0,0,0,.4);
      z-index: 1001;
      display: none;
      align-items: center;
      justify-content: center;
    }
    #depPickerContent {
      background: var(--bg-card);
      border-radius: 12px;
      padding: 24px;
      width: 440px;
      max-width: 90vw;
      max-height: 80vh;
      overflow-y: auto;
      box-shadow: 0 8px 32px rgba(0,0,0,.18);
    }
    .dep-picker-label {
      font-size: 11px; font-weight: 600;
      text-transform: uppercase; letter-spacing: .05em;
      color: var(--text-muted); margin-bottom: 8px;
    }
    .dep-picker-item:hover { background: var(--bg-secondary); }
    .dep-remove-btn {
      background: none; border: none; cursor: pointer;
      color: #b91c1c; font-size: 15px; padding: 0 4px; line-height: 1;
    }
    .dep-remove-btn:hover { opacity: .7; }
    .dep-add-btn {
      display: inline-flex; align-items: center;
      font-size: 13px; font-weight: 600; padding: 3px 8px;
      border-radius: 10px; cursor: pointer; border: none;
      font-family: inherit; margin-left: 4px; margin-top: 4px;
      background: var(--bg-secondary); color: var(--text-muted);
      transition: background .15s, color .15s;
      min-width: 28px; min-height: 22px;
    }
    .dep-add-btn:hover { background: var(--border); color: var(--text-primary); }

    /* ===== ABA PROJETOS — MATRIZ MoSCoW ===== */
    .proj-matrix {
      display: grid; grid-template-columns: 1fr 1fr;
      grid-template-rows: 1fr 1fr; gap: 12px;
      flex: 1; min-height: 0; padding: 4px 0;
    }
    .proj-quadrant {
      background: var(--bg-secondary); border-radius: 12px;
      border: 2px solid var(--border); display: flex;
      flex-direction: column; overflow: hidden; min-height: 0;
    }
    .proj-quadrant.drag-over { border-color: var(--accent); box-shadow: 0 0 0 3px rgba(217,119,87,.2); }
    .proj-quadrant-header {
      padding: 10px 14px 8px; border-bottom: 1px solid var(--border);
      flex-shrink: 0; display: flex; align-items: center; gap: 8px;
    }
    .proj-quadrant-title { font-size: 13px; font-weight: 700; text-transform: uppercase; letter-spacing: .04em; }
    .proj-quadrant-desc  { font-size: 11px; color: var(--text-muted); margin-top: 1px; }
    .proj-quadrant-count { margin-left: auto; font-size: 11px; font-weight: 600; padding: 2px 7px; border-radius: 8px; }
    .proj-q-must   .proj-quadrant-header { border-top: 3px solid #ef4444; }
    .proj-q-should .proj-quadrant-header { border-top: 3px solid #f97316; }
    .proj-q-could  .proj-quadrant-header { border-top: 3px solid #3b82f6; }
    .proj-q-wont   .proj-quadrant-header { border-top: 3px solid #9ca3af; }
    .proj-q-must   .proj-quadrant-title { color: #b91c1c; }
    .proj-q-should .proj-quadrant-title { color: #c2410c; }
    .proj-q-could  .proj-quadrant-title { color: #1d4ed8; }
    .proj-q-wont   .proj-quadrant-title { color: #4b5563; }
    .proj-q-must   .proj-quadrant-count { background: #fee2e2; color: #b91c1c; }
    .proj-q-should .proj-quadrant-count { background: #ffedd5; color: #c2410c; }
    .proj-q-could  .proj-quadrant-count { background: #dbeafe; color: #1d4ed8; }
    .proj-q-wont   .proj-quadrant-count { background: #f3f4f6; color: #4b5563; }
    .proj-cards { flex: 1; overflow-y: auto; padding: 8px 10px; display: flex; flex-direction: column; gap: 6px; }
    .proj-card {
      background: var(--bg-card); border: 1px solid var(--border); border-radius: 8px;
      padding: 9px 12px; cursor: grab; user-select: none;
      display: flex; align-items: center; gap: 10px;
      font-size: 13px; font-weight: 500; transition: box-shadow .15s;
    }
    .proj-card:hover { box-shadow: 0 2px 8px var(--shadow-hover); }
    .proj-card.dragging { opacity: .4; }
    .proj-card-info { flex: 1; min-width: 0; }
    .proj-card-name { white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
    .proj-card-count { font-size: 11px; color: var(--text-muted); margin-top: 2px; }
    .proj-card-grip { color: var(--text-muted); font-size: 16px; flex-shrink: 0; }
    .proj-drop-hint {
      font-size: 12px; color: var(--text-muted); text-align: center;
      padding: 16px 0; font-style: italic; pointer-events: none;
    }

    /* ===== MODAL DE ERRO DE SALVAMENTO ===== */
    #errorModalOverlay {
      display: none; position: fixed; inset: 0;
      background: rgba(0,0,0,.45); z-index: 9999;
      align-items: center; justify-content: center;
    }
    #errorModalOverlay.visible { display: flex; }
    #errorModalBox {
      background: var(--bg-card); border-radius: 14px;
      padding: 28px 32px; max-width: 420px; width: 90vw;
      box-shadow: 0 12px 40px rgba(0,0,0,.22);
      border: 2px solid #ef4444;
      display: flex; flex-direction: column; gap: 16px;
    }
    #errorModalBox h3 {
      font-size: 16px; font-weight: 700; color: #b91c1c;
      display: flex; align-items: center; gap: 8px; margin: 0;
    }
    #errorModalBox p {
      font-size: 13px; color: var(--text-secondary);
      margin: 0; line-height: 1.5;
    }
    #errorModalBox button {
      align-self: flex-end; padding: 8px 22px;
      background: #ef4444; color: #fff; border: none;
      border-radius: 8px; font-size: 14px; font-weight: 600;
      cursor: pointer; font-family: inherit;
    }
    #errorModalBox button:hover { background: #dc2626; }
  </style>
</head>
<body>
  <header>
    <div class="header-left">
      <svg width="28" height="28" viewBox="0 0 32 32" style="margin-right: 12px; flex-shrink: 0;">
        <rect x="4" y="2" width="24" height="28" rx="4" fill="#faf9f5" stroke="#D97757" stroke-width="2"/>
        <rect x="8" y="0" width="16" height="5" rx="2.5" fill="#D97757"/>
        <path d="M9 13l3 3 5-5" fill="none" stroke="#D97757" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"/>
        <rect x="20" y="12" width="5" height="2" rx="1" fill="#c4c4c2"/>
        <rect x="9" y="20" width="10" height="2" rx="1" fill="#c4c4c2"/>
        <rect x="9" y="25" width="7" height="2" rx="1" fill="#c4c4c2"/>
      </svg>
      <div>
        <h1>Productivity</h1>
        <div id="filePath" class="file-path"></div>
      </div>
      <div class="view-toggle" id="mainTabToggle">
        <button id="tasksTabBtn" class="active">Tasks</button>
        <button id="projectsTabBtn">Projetos</button>
        <button id="memoryTabBtn">Memory</button>
      </div>
      <div class="view-toggle" id="taskViewToggle">
        <button id="boardViewBtn" class="active">Projetos</button>
        <button id="kanbanViewBtn">Kanban</button>
        <button id="moscowViewBtn">MoSCoW</button>
        <button id="modoViewBtn">Claude</button>
        <button id="esforcoViewBtn">Esforço</button>
        <button id="prioridadeViewBtn">Prioridade</button>
        <button id="calendarioViewBtn">Calendário</button>
      </div>
    </div>
    <div class="buttons">
      <button id="openTaskBtn">Select File</button>
      <button id="openMemoryBtn" style="display: none;">Open Folder</button>
      <button id="saveBtn" class="primary" disabled style="display: none;">Save</button>
    </div>
  </header>

  <!-- TASKS TAB PANEL -->
  <div class="tab-panel active" id="tasksPanel">
    <div id="projectFilterBar"></div>
    <div class="list-view" id="listView" style="display: none;"></div>
    <div id="calendarView" style="display: none;"></div>
    <div class="board" id="board">
      <div class="empty-state" id="boardEmptyState" style="width: 100%;">
        <p style="margin-bottom: 24px; font-size: 18px; font-weight: 600; color: var(--text-primary);">Select your TASKS.md file</p>
        <button id="openBtnLarge">Select TASKS.md</button>
      </div>
    </div>
  </div>

  <!-- PROJECTS TAB PANEL -->
  <div class="tab-panel" id="projectsPanel"></div>

  <!-- MEMORY TAB PANEL -->
  <div class="tab-panel" id="memoryPanel">
    <div id="memoryEmptyState" class="empty-state">
      <p style="margin-bottom: 24px; font-size: 18px; font-weight: 600; color: var(--text-primary);">Select your project folder</p>
      <button id="openMemoryBtnLarge">Select Folder</button>
    </div>
    <div id="memoryMainContent" style="display: none; flex-direction: column; min-height: 0; flex: 1;">
      <div class="memory-tabs" id="memoryTabsContainer"></div>
      <div class="memory-content-area">
        <div id="memoryContentContainer"></div>
      </div>
    </div>
  </div>

  <!-- MODAL (shared for memory) -->
  <div class="modal-overlay" id="modalOverlay">
    <div class="modal">
      <div class="modal-header">
        <h3 id="modalTitle">Edit</h3>
        <button class="modal-close" id="modalClose">&times;</button>
      </div>
      <div class="modal-body" id="modalBody"></div>
      <div class="modal-footer">
        <button id="modalCancel">Cancel</button>
        <button id="modalSave" class="primary">Save</button>
      </div>
    </div>
  </div>

  <div class="status-bar" id="status"></div>

  <script>
    window.onerror = function(msg, src, line, col, err) {
      document.body.innerHTML = '<div style="font-family:monospace;padding:20px;background:#fff;color:#c00;font-size:14px;">'
        + '<b>ERRO JS:</b> ' + msg + '<br>'
        + 'Linha: ' + line + ', Col: ' + col + '<br>'
        + (err ? err.stack : '') + '</div>';
    };
    // ===== ÍNDICE DE SEÇÕES (Ctrl+G + número de linha) =====
    // L2142  showErrorModal — modal de erro de salvamento
    // L2147  loadParsedContent — wrapper de parse+assign (5 pontos de carga)
    // L2155  IndexedDB — persistência de file handles entre sessões
    // L2210  HTTP LOAD — tryHttpLoad, tryHttpLoadMemory
    // L2430  MAIN TAB — Tasks / Projetos / Memory
    // L2478  PROJETOS — setSectionMoscow, renderProjectsMatrix (matriz MoSCoW)
    // L2590  SHARED STATE de tarefas
    // L2601  DEPENDENCY SYSTEM — depMap, taskFlatMap, taskIdMap, potentialScoreMap
    // L2626  buildDependencyMap + cálculo de scores potenciais (passo 1)
    // L2689  isTaskBlocked / sortByScoreBlockedLast
    // L2705  assignAndMigrateIds — IDs persistentes [#NNN] e migração legacy
    // L2800  DEPENDENCY PICKER — modal de deps (showDepPicker, add/removeDependency)
    // L2990  parseTaskMarkdown — parser do markdown → sections + tasks
    // L3130  createCard — cards com badges (MoSCoW, Modo, Esforço, Status, Deps)
    // L3680  SAVE/WATCH — autoSave (debounced), checkForExternalChanges (1 s)
    // L3740  renderTasks — dispatch de views + scroll preservation
    // L3830  renderKanban
    // L3900  renderMoscow / TAG PICKER (MoSCoW / Modo / Esforço / Status)
    // L4065  renderModo
    // L4185  SCORE ENGINE — calcScore, calcDeadlinePoints
    // L4230  renderEsforco
    // L4320  renderPrioridade
    // L4430  renderCalendario (grade mensal + sidebar + drag-and-drop)
    // L4730  renderBoard / renderList
    // L5410  MEMORY FUNCTIONALITY
    // =======================================================

    // ===== SHARED STATE =====
    const IS_HTTP = window.location.protocol.startsWith('http');
    const DEFAULT_TASKS_FILE = 'Minhas_Tarefas.md';

    let activeMainTab = 'tasks'; // 'tasks' or 'memory'

    const statusEl = document.getElementById('status');
    const filePathEl = document.getElementById('filePath');

    function showStatus(msg) {
      statusEl.textContent = msg;
      statusEl.classList.add('visible');
      setTimeout(() => statusEl.classList.remove('visible'), 2000);
    }

    // Wrapper centralizado: parse + assign sempre juntos (nunca chamar separado)
    function showErrorModal(msg) {
      document.getElementById('errorModalMsg').textContent = msg;
      document.getElementById('errorModalOverlay').classList.add('visible');
    }

    function loadParsedContent(content) {
      const result = parseTaskMarkdown(content);
      sections = result.sections;
      tasks = result.tasks;
      assignAndMigrateIds();
    }

    // ===== IndexedDB for persisting file handles =====
    const DB_NAME = 'ProductivityApp';
    const STORE_NAME = 'fileHandles';

    function openDB() {
      return new Promise((resolve, reject) => {
        const req = indexedDB.open(DB_NAME, 1);
        req.onerror = () => reject(req.error);
        req.onsuccess = () => resolve(req.result);
        req.onupgradeneeded = (e) => {
          const db = e.target.result;
          if (!db.objectStoreNames.contains(STORE_NAME)) {
            db.createObjectStore(STORE_NAME);
          }
        };
      });
    }

    async function saveFileHandle(key, handle) {
      try {
        const db = await openDB();
        const tx = db.transaction(STORE_NAME, 'readwrite');
        tx.objectStore(STORE_NAME).put(handle, key);
        return new Promise((r, rej) => { tx.oncomplete = () => r(); tx.onerror = () => rej(tx.error); });
      } catch (e) { console.log('Save handle error:', e); }
    }

    async function getFileHandle(key) {
      try {
        const db = await openDB();
        return new Promise((resolve, reject) => {
          const req = db.transaction(STORE_NAME).objectStore(STORE_NAME).get(key);
          req.onerror = () => reject(req.error);
          req.onsuccess = () => resolve(req.result);
        });
      } catch (e) { console.log('Get handle error:', e); return null; }
    }

    async function loadTaskFile(fileHandle) {
      try {
        const file = await fileHandle.getFile();
        const content = await file.text();
        lastModified = file.lastModified;
        loadParsedContent(content);
        taskFileName = file.name;
        filePathEl.textContent = file.name;
        switchTaskView('board');
        startWatching();
        return true;
      } catch (e) {
        console.log('Error loading task file:', e);
        return false;
      }
    }

    // --- HTTP mode: carrega Minhas_Tarefas.md via fetch ---
    async function tryHttpLoad() {
      try {
        const response = await fetch('./' + DEFAULT_TASKS_FILE, { cache: 'no-store' });
        if (!response.ok) return false;
        const content = await response.text();
        const serverMod = new Date(response.headers.get('Last-Modified') || 0).getTime();
        lastModified = serverMod || Date.now();
        loadParsedContent(content);
        taskFileName = DEFAULT_TASKS_FILE;
        filePathEl.textContent = DEFAULT_TASKS_FILE;
        switchTaskView('board');
        // Arquiva tarefas concluídas automaticamente ao abrir
        await archiveCompletedTasks();
        startWatching();
        showStatus('Tarefas carregadas');
        // Também carrega a memória
        await tryHttpLoadMemory();
        return true;
      } catch (e) {
        console.error('HTTP load error:', e);
        showStatus('❌ Erro ao carregar: ' + e.message);
        return false;
      }
    }

    async function tryHttpLoadMemory() {
      try {
        memoryData = { claudeMd: null, memoryFiles: [], memoryDirs: {} };

        const claudeResp = await fetch('./CLAUDE.md', { cache: 'no-store' });
        if (claudeResp.ok) {
          const claudeContent = await claudeResp.text();
          memoryData.claudeMd = { content: claudeContent, fileHandle: null, httpPath: 'CLAUDE.md' };
        }

        const listResp = await fetch('/list?dir=memory', { cache: 'no-store' });
        if (listResp.ok) {
          const items = await listResp.json();
          for (const item of items) {
            if (!item.isDir && item.name.endsWith('.md')) {
              const r = await fetch('./memory/' + item.name, { cache: 'no-store' });
              if (r.ok) {
                memoryData.memoryFiles.push({ name: item.name, content: await r.text(), fileHandle: null, httpPath: 'memory/' + item.name });
              }
            } else if (item.isDir) {
              memoryData.memoryDirs[item.name] = [];
              const subResp = await fetch('/list?dir=memory/' + item.name, { cache: 'no-store' });
              if (subResp.ok) {
                for (const sub of await subResp.json()) {
                  if (!sub.isDir && sub.name.endsWith('.md')) {
                    const r = await fetch('./memory/' + item.name + '/' + sub.name, { cache: 'no-store' });
                    if (r.ok) {
                      const c = await r.text();
                      memoryData.memoryDirs[item.name].push({
                        name: sub.name, content: c, fileHandle: null,
                        httpPath: 'memory/' + item.name + '/' + sub.name,
                        parsed: parseMemoryMarkdown(c)
                      });
                    }
                  }
                }
              }
            }
          }
        }

        if (memoryData.claudeMd || memoryData.memoryFiles.length > 0 || Object.keys(memoryData.memoryDirs).length > 0) {
          renderMemory();
          memoryEmptyState.style.display = 'none';
          memoryMainContent.style.display = 'flex';
        }
      } catch (e) { console.log('HTTP memory load error:', e); }
    }

    // --- HTTP save helper ---
    async function httpSave(filename, content) {
      const resp = await fetch('/save', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ filename, content })
      });
      if (!resp.ok) throw new Error('Erro ao salvar no servidor');
    }

    // --- Arquiva tarefas 100% concluídas em tarefas_concluidas.md ---
    async function archiveCompletedTasks() {
      // Coleta tarefas com checkbox principal marcado [x]
      const completedBySection = [];
      let totalArchived = 0;

      sections.forEach(section => {
        const sectionTasks = (tasks[section.id] || []).filter(t => t.checked);
        if (sectionTasks.length > 0) {
          completedBySection.push({ name: section.name, id: section.id, tasks: sectionTasks });
          totalArchived += sectionTasks.length;
        }
      });

      if (totalArchived === 0) return; // Nada a arquivar

      // Monta entrada no arquivo de concluídas
      const today = new Date().toISOString().slice(0, 10);
      let archiveEntry = `\n## Arquivadas em ${today}\n`;
      completedBySection.forEach(({ name, tasks: doneTasks }) => {
        archiveEntry += `\n### ${name}\n`;
        doneTasks.forEach(t => {
          const note = t.note ? ` - ${t.note}` : '';
          archiveEntry += `- [x] **${t.title}**${note}\n`;
          t.subtasks.forEach(st => {
            const stCheckbox = st.checked ? '[x]' : '[ ]';
            archiveEntry += `  - ${stCheckbox} ${st.text}\n`;
          });
        });
      });

      // Carrega arquivo de concluídas existente (ou cria)
      let existingContent = '# Tarefas Concluídas\n';
      try {
        const resp = await fetch('./tarefas_concluidas.md', { cache: 'no-store' });
        if (resp.ok) existingContent = await resp.text();
      } catch (e) {}

      // Salva arquivo de concluídas com nova entrada
      const newArchiveContent = existingContent.trimEnd() + '\n' + archiveEntry;
      await httpSave('tarefas_concluidas.md', newArchiveContent);

      // Remove concluídas do objeto de tarefas em memória
      sections.forEach(section => {
        tasks[section.id] = (tasks[section.id] || []).filter(t => !t.checked);
      });

      // Salva Minhas_Tarefas.md sem as concluídas
      await httpSave(DEFAULT_TASKS_FILE, toMarkdown());

      // Atualiza lastModified para o watcher não recarregar
      lastModified = Date.now();

      showStatus(`✓ ${totalArchived} tarefa${totalArchived > 1 ? 's' : ''} arquivada${totalArchived > 1 ? 's' : ''} em tarefas_concluidas.md`);
    }

    async function tryAutoConnect() {
      // No modo HTTP, tudo é feito via fetch — sem diálogos
      if (IS_HTTP) return await tryHttpLoad();

      // Modo file:// — usa IndexedDB + File System Access API
      const taskHandle = await getFileHandle('taskFileHandle');
      const memoryHandle = await getFileHandle('memoryDirHandle');
      let taskConnected = false;

      if (taskHandle) {
        try {
          const perm = await taskHandle.queryPermission({ mode: 'read' });
          if (perm === 'granted') {
            if (await loadTaskFile(taskHandle)) {
              showStatus('Auto-connected to ' + taskHandle.name);
              taskConnected = true;
            }
          } else { showReconnectButton(); }
        } catch (e) { showReconnectButton(); }
      }

      if (memoryHandle) {
        try {
          const perm = await memoryHandle.queryPermission({ mode: 'read' });
          if (perm === 'granted') {
            memoryData = { claudeMd: null, memoryFiles: [], memoryDirs: {} };
            try {
              const claudeFileHandle = await memoryHandle.getFileHandle('CLAUDE.md');
              const file = await claudeFileHandle.getFile();
              memoryData.claudeMd = { content: await file.text(), fileHandle: claudeFileHandle };
            } catch (e) {}
            try {
              const memoryDir = await memoryHandle.getDirectoryHandle('memory');
              for await (const entry of memoryDir.values()) {
                if (entry.kind === 'file' && entry.name.endsWith('.md')) {
                  const file = await entry.getFile();
                  memoryData.memoryFiles.push({ name: entry.name, content: await file.text(), fileHandle: entry });
                } else if (entry.kind === 'directory') {
                  memoryData.memoryDirs[entry.name] = [];
                  for await (const subEntry of entry.values()) {
                    if (subEntry.kind === 'file' && subEntry.name.endsWith('.md')) {
                      const file = await subEntry.getFile();
                      const c = await file.text();
                      memoryData.memoryDirs[entry.name].push({
                        name: subEntry.name, content: c, fileHandle: subEntry,
                        dirHandle: entry, parsed: parseMemoryMarkdown(c)
                      });
                    }
                  }
                }
              }
            } catch (e) {}
            renderMemory();
            memoryEmptyState.style.display = 'none';
            memoryMainContent.style.display = 'flex';
          }
        } catch (e) {}
      }
      return taskConnected;
    }

    // ===== PROJETOS — Matriz MoSCoW das seções =====

    function setSectionMoscow(sectionId, newMoscow) {
      const section = sections.find(s => s.id === sectionId);
      if (!section) return;
      // Remove tag MoSCoW antiga do nome
      let cleanName = section.name.replace(/\s*\[(Must|Should|Could|Won'?t)\]/gi, '').trim();
      const tagMap = { must: 'Must', should: 'Should', could: 'Could', wont: "Won't" };
      section.name = newMoscow && tagMap[newMoscow] ? `${cleanName} [${tagMap[newMoscow]}]` : cleanName;

    function renderProjectsMatrix() {
      projectsPanel.innerHTML = '';

      const quadrants = [
        { key: 'must',   label: 'Must',    cls: 'proj-q-must',   desc: 'Crítico — prioridade máxima' },
        { key: 'should', label: 'Should',  cls: 'proj-q-should', desc: 'Importante — fazer em seguida' },
        { key: 'could',  label: 'Could',   cls: 'proj-q-could',  desc: 'Desejável — se houver tempo' },

      ];

      const matrix = document.createElement('div');
      matrix.className = 'proj-matrix';

      quadrants.forEach(({ key, label, cls, desc }) => {
        const secs = sections.filter(s => (s.moscow || '') === key);

        const quadrant = document.createElement('div');
        quadrant.className = `proj-quadrant ${cls}`;
        quadrant.dataset.moscow = key;

        // Header
        const header = document.createElement('div');
        header.className = 'proj-quadrant-header';
        header.innerHTML = `
          <div>
            <div class="proj-quadrant-title">${label}</div>
            <div class="proj-quadrant-desc">${desc}</div>
          </div>
          <span class="proj-quadrant-count">${secs.length}</span>
        `;
        quadrant.appendChild(header);

        // Cards container
        const cardsEl = document.createElement('div');
        cardsEl.className = 'proj-cards';

        if (secs.length === 0) {
          cardsEl.innerHTML = '<div class="proj-drop-hint">Arraste seções aqui</div>';
        }

        secs.forEach(section => {
          const taskCount = (tasks[section.id] || []).length;
          const doneCount = (tasks[section.id] || []).filter(t => t.checked).length;
          const cleanName = section.name.replace(/\s*\[(Must|Should|Could|Won'?t)\]/gi, '').trim();

          const card = document.createElement('div');
          card.className = 'proj-card';
          card.draggable = true;
          card.dataset.sectionId = section.id;
          card.innerHTML = `
            <span class="proj-card-grip">⠿</span>

            </div>

          card.addEventListener('dragstart', e => {
            card.classList.add('dragging');

        matrix.appendChild(quadrant);
